<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MERCADREAM — Genesis Market Core</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=IBM+Plex+Mono:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
<style>
        :root {
            --acid: #A8D700;
            --void: #040404;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --border-highlight: #434933;
            --text-muted: #4a4a4a;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--void); color: #e5e2e1; 
            font-family: 'IBM Plex Mono', monospace; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Scanline Animation */
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .scan-line { 
            position: fixed; inset: 0; pointer-events: none; z-index: 100;
            background: linear-gradient(to bottom, transparent, rgba(168, 215, 0, 0.05), transparent);
            height: 2px; width: 100%; animation: scan 4s linear infinite;
        }

        /* CRT Grid Overlay */
        .grid-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 50;
            background-image: 
                linear-gradient(rgba(168, 215, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 215, 0, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .terminal-header {
            border-bottom: 1px solid var(--border);
            background: rgba(4, 4, 4, 0.95);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 60;
        }

        .asset-card {
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .asset-card:hover {
            border-color: var(--acid);
            box-shadow: 0 0 15px rgba(168, 215, 0, 0.1);
        }
        .asset-card.sold {
            opacity: 0.5;
            border-color: #333;
        }
        .sold-label {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg);
            color: #ff3333; font-family: 'Orbitron', sans-serif; font-weight: 900;
            font-size: 10px; letter-spacing: 2px; border: 1px solid #ff3333;
            padding: 1px 4px; background: rgba(0,0,0,0.8);
            z-index: 10;
        }

        .flicker { animation: flicker 0.1s infinite; }
        @keyframes flicker { 0% { opacity: 0.9; } 100% { opacity: 1; } }

        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--void); }
        ::-webkit-scrollbar-thumb { background: var(--border-highlight); }
    </style>
</head>
<body class="pb-20">
<div class="scan-line"></div>
<div class="grid-overlay"></div>
<!-- Header -->
<header class="terminal-header p-4 md:px-8 flex justify-between items-end">
<div>
<h1 class="text-2xl md:text-3xl font-black tracking-tighter uppercase font-headline">MERCADREAM <span class="text-[#A8D700]">CORE</span></h1>
<p class="text-[8px] text-[#4a4a4a] tracking-[2px] mt-1 uppercase">AUTONOMOUS ASSET LIQUIDITY PROTOCOL v.2026.05</p>
</div>
<div class="text-right">
<div class="text-[8px] text-[#4a4a4a] mb-1 tracking-widest">SYSTEM_LOAD</div>
<div class="text-xl md:text-2xl font-bold text-[#A8D700] font-headline flicker" id="load-val">0.0%</div>
</div>
</header>
<!-- Stats Bar -->
<div class="bg-surface border-b border-[#434933] px-4 md:px-8 py-2 flex justify-between items-center text-[9px] font-label-caps">
<div class="flex gap-6">
<span class="text-[#c4caac]">NODE: 0x4F...E1</span>
<span class="text-[#c4caac] hidden sm:inline">PROTOCOL: GENESIS_OVR</span>
<span class="text-[#c4caac]">LATENCY: 14ms</span>
</div>
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-[#A8D700] animate-pulse"></div>
<span class="text-[#A8D700] font-bold">LIVE_UPLINK</span>
</div>
</div>
<!-- Main Grid -->
<main class="p-2 md:p-4 max-w-[1920px] mx-auto">
<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-2 md:gap-3" id="asset-grid">
<!-- Items injected by JS -->
</div>
</main>
<!-- Navigation -->
<nav class="fixed bottom-0 left-0 w-full z-[70] bg-[#040404] border-t border-[#434933] h-16 flex justify-around items-center px-4">
<a class="flex flex-col items-center text-[#4a4a4a] hover:text-white transition-colors" href="index.html">
<span class="material-symbols-outlined text-[20px]">grid_view</span>
<span class="text-[8px] mt-1 font-bold">EXPLORE</span>
</a>
<a class="flex flex-col items-center text-[#A8D700]" href="market.html">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings:'FILL' 1;">terminal</span>
<span class="text-[8px] mt-1 font-bold">CORE</span>
</a>
<a class="flex flex-col items-center text-[#4a4a4a] hover:text-white transition-colors" href="verify.html">
<span class="material-symbols-outlined text-[20px]">verified</span>
<span class="text-[8px] mt-1 font-bold">VAULT</span>
</a>
<a class="flex flex-col items-center text-[#4a4a4a] hover:text-white transition-colors" href="profile.html">
<span class="material-symbols-outlined text-[20px]">account_circle</span>
<span class="text-[8px] mt-1 font-bold">PROFILE</span>
</a>
</nav>
<script>
        const grid = document.getElementById('asset-grid');
        const loadVal = document.getElementById('load-val');

        const generateAsset = (index) => {
            const id = 8000 + index;
            const price = (Math.random() * 5000 + 500).toFixed(0);
            const isSold = Math.random() > 0.85;
            const type = ['DRAMA', 'ACTION', 'NEURAL', 'AUDIO', 'SYNC', 'LOGIC', 'KERNEL', 'PULSE'][Math.floor(Math.random() * 8)];
            
            return `
                <article class="asset-card p-2 md:p-2.5 ${isSold ? 'sold' : ''}">
                    <div class="flex justify-between items-start mb-1.5">
                        <div class="text-[7px] text-[#A8D700] font-bold tracking-tighter">ID: ${id}</div>
                        <div class="text-[6px] bg-white/5 px-1 py-0.5 border border-white/10 text-[#c4caac]">${type}</div>
                    </div>
                    
                    <div class="aspect-video sm:aspect-square bg-[#040404] border border-white/5 mb-2 relative overflow-hidden group">
                        <img src="https://picsum.photos/seed/${id}/300/300" class="w-full h-full object-cover opacity-40 grayscale group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-700">
                        ${isSold ? '<div class="sold-label">LOCKED</div>' : ''}
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    </div>

                    <div class="flex flex-col gap-0.5">
                        <div class="flex justify-between items-end">
                            <span class="text-[7px] text-[#4a4a4a] uppercase tracking-widest">Valuation</span>
                            <span class="text-[10px] md:text-xs font-bold font-headline ${isSold ? 'line-through text-[#4a4a4a]' : 'text-white'}">${Number(price).toLocaleString()} <span class="text-[7px]">GNS</span></span>
                        </div>
                        <div class="text-[6px] mt-0.5 flex justify-between">
                            <span class="${isSold ? 'text-red-900' : 'text-[#4a4a4a]'}">${isSold ? 'ACCESS_DENIED' : 'SYNC_AVAILABLE'}</span>
                            <span class="text-[#4a4a4a] opacity-50">${(Math.random() * 2).toFixed(1)}s ago</span>
                        </div>
                    </div>
                </article>
            `;
        };

        const updateGrid = () => {
            // High density update
            let items = '';
            for (let i = 0; i < 48; i++) {
                items += generateAsset(i);
            }
            grid.innerHTML = items;
            
            // Randomize load value
            const load = (Math.random() * 100).toFixed(1);
            loadVal.textContent = load + '%';
            
            if (load > 85) loadVal.style.color = '#ff3333';
            else loadVal.style.color = '#A8D700';
        };

        // Initial render
        updateGrid();

        // Live update cycle (simulating high-frequency data refresh)
        // Reduced frequency for desktop performance/stability while keeping the "live" feel
        setInterval(updateGrid, 5000);
    </script>
</body></html>
