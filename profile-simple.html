<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERCADREAM - Profile</title>
    <style>
        body {
            background: #060606;
            color: #e5e2e1;
            font-family: monospace;
            padding: 40px;
            text-align: center;
        }
        .card {
            max-width: 500px;
            margin: auto;
            background: #111;
            border: 1px solid #c8ff00;
            padding: 40px;
            border-radius: 8px;
        }
        .credits {
            font-size: 48px;
            color: #c8ff00;
            font-weight: bold;
        }
        .button {
            background: #c8ff00;
            color: #000;
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
        }
        .button-danger {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        pre {
            text-align: left;
            background: #1a1a1a;
            padding: 20px;
            overflow-x: auto;
            font-size: 12px;
        }
        .success { color: #c8ff00; }
        .error { color: #ff4444; }
    </style>
</head>
<body>

<div class="card">
    <h1> MERCADREAM</h1>
    <div style="width: 50px; height: 2px; background: #c8ff00; margin: 20px auto;"></div>
    
    <h2>PROFILE</h2>
    
    <div id="status"></div>
    <div id="data"></div>
    
    <div>
        <button class="button" onclick="window.location.href='studio.html'"> STUDIO</button>
        <button class="button button-danger" onclick="logout()"> LOGOUT</button>
        <button class="button" onclick="refresh()"> REFRESH</button>
    </div>
</div>

<script>
console.log('Profile page started');

function refresh() {
    location.reload();
}

function logout() {
    console.log('Logging out...');
    localStorage.clear();
    window.location.href = 'index.html';
}

function loadData() {
    var session = localStorage.getItem('sb_session');
    var email = localStorage.getItem('md_email');
    var credits = localStorage.getItem('md_credits');
    var plan = localStorage.getItem('md_plan');
    var userId = localStorage.getItem('md_user_id');
    
    var statusDiv = document.getElementById('status');
    var dataDiv = document.getElementById('data');
    
    if (session === 'true' || session === '1') {
        statusDiv.innerHTML = '<p class="success"> YOU ARE LOGGED IN</p>';
        dataDiv.innerHTML = `
            <pre>
{
  "session": "${session}",
  "email": "${email || 'NOT SET'}",
  "credits": "${credits || '0'}",
  "plan": "${plan || 'free'}",
  "user_id": "${userId || 'NOT SET'}"
}
            </pre>
        `;
    } else {
        statusDiv.innerHTML = '<p class="error"> NOT LOGGED IN</p>';
        dataDiv.innerHTML = '<pre>No session found. Please login first.</pre>';
    }
}

// منع أي إعادة توجيه تلقائية
window.addEventListener('beforeunload', function(e) {
    console.log('Page is being unloaded');
});

// تحميل البيانات
loadData();

// تحديث كل ثانية
setInterval(loadData, 1000);
</script>
</body>
</html>
