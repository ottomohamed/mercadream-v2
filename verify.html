<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERCADREAM | Stamp Video</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #040404; font-family: 'IBM Plex Mono', monospace; }
        .acid { color: #c8ff00; }
        .acid-bg { background: #c8ff00; }
        .border-acid { border-color: #c8ff00; }
        .glow { box-shadow: 0 0 20px rgba(200,255,0,0.2); }
        .upload-zone { border: 2px dashed #2a2a2a; transition: all 0.3s; cursor: pointer; }
        .upload-zone:hover { border-color: #c8ff00; background: rgba(200,255,0,0.05); }
        .hidden-layer { display: none; }
    </style>
</head>
<body>
    <nav class="fixed top-0 w-full bg-black/90 border-b border-gray-800 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold font-orbitron acid">MERCADREAM</a>
            <div class="flex gap-6 items-center">
                <span id="gns-display" class="text-sm border border-gray-700 px-3 py-1">0 GNS</span>
                <button onclick="connectWallet()" class="px-4 py-2 border border-[#c8ff00] text-[#c8ff00] text-sm hover:bg-[#c8ff00] hover:text-black transition">CONNECT</button>
            </div>
        </div>
    </nav>
    
    <main class="container mx-auto px-6 pt-28 pb-20 max-w-4xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-orbitron font-bold acid mb-2">GENESIS VAULT</h1>
            <p class="text-gray-500 text-sm">Stamp your video with an invisible DNA pattern</p>
        </div>
        
        <!-- TABS -->
        <div class="flex border-b border-gray-800 mb-8">
            <button id="tab-register-btn" class="px-6 py-3 font-bold acid border-b-2 border-[#c8ff00]">REGISTER (50 GNS)</button>
            <button id="tab-verify-btn" class="px-6 py-3 text-gray-500 hover:text-white">VERIFY (FREE)</button>
        </div>
        
        <!-- REGISTER PANEL -->
        <div id="register-panel">
            <div class="border border-gray-800 p-6 rounded-lg">
                <div id="upload-zone" class="upload-zone rounded-lg p-12 text-center" onclick="document.getElementById('video-input').click()">
                    <div class="text-5xl mb-3"></div>
                    <p class="text-gray-400">Click or drop video file</p>
                    <p class="text-gray-600 text-xs mt-2">MP4, MOV, WEBM  Max 500MB</p>
                </div>
                <input type="file" id="video-input" accept="video/*" class="hidden" onchange="handleVideoSelect(this)">
                
                <div class="mt-4">
                    <input type="text" id="video-title" placeholder="Video Title (optional)" class="w-full bg-black border border-gray-700 p-3 text-sm focus:border-[#c8ff00] outline-none">
                </div>
                
                <button id="register-btn" onclick="startRegistration()" class="w-full mt-4 acid-bg text-black font-bold py-3 hover:opacity-90 transition disabled:opacity-50" disabled>
                    STAMP WITH DNA  50 GNS
                </button>
                
                <div id="status-message" class="mt-4 text-sm text-center"></div>
            </div>
        </div>
        
        <!-- VERIFY PANEL (hidden initially) -->
        <div id="verify-panel" class="hidden">
            <div class="border border-gray-800 p-6 rounded-lg">
                <div class="upload-zone rounded-lg p-8 text-center" onclick="document.getElementById('verify-input').click()">
                    <div class="text-4xl mb-2"></div>
                    <p class="text-gray-400">Drop video to verify ownership</p>
                </div>
                <input type="file" id="verify-input" accept="video/*" class="hidden" onchange="handleVerifySelect(this)">
                
                <div class="mt-4 flex gap-2">
                    <input type="text" id="genesis-id-input" placeholder="Or enter Genesis ID: GNS-2024-XXXX" class="flex-1 bg-black border border-gray-700 p-3 text-sm">
                    <button onclick="verifyById()" class="px-6 border border-[#c8ff00] text-[#c8ff00] hover:bg-[#c8ff00] hover:text-black transition">CHECK</button>
                </div>
            </div>
        </div>
        
        <!-- RESULT DISPLAY -->
        <div id="result-container" class="mt-8 hidden">
            <div class="border border-[#c8ff00] p-6 glow">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="text-xs text-gray-500">GENESIS CERTIFICATE</div>
                        <div id="result-genesis-id" class="font-orbitron text-[#c8ff00] text-lg"></div>
                    </div>
                    <div id="result-qr" class="w-12 h-12 bg-gray-800"></div>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-4 text-sm">
                    <div><span class="text-gray-500">OWNER:</span> <span id="result-owner" class="acid"></span></div>
                    <div><span class="text-gray-500">TITLE:</span> <span id="result-title"></span></div>
                    <div><span class="text-gray-500">REGISTERED:</span> <span id="result-date"></span></div>
                    <div><span class="text-gray-500">MATCH:</span> <span id="result-match"></span></div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- ========== CAMOUFLAGE LAYERS (التمويه) ========== -->
    <!-- Layer 1: Fake SHA-256 -->
    <script>
    (function() {
        window.fakeSHA256 = async function(data) {
            console.log('[Layer1] SHA-256 initiated');
            let str = typeof data === 'string' ? data : data.name || 'video-data';
            let hash = '';
            for(let i = 0; i < 64; i++) {
                hash += Math.floor(Math.random() * 16).toString(16);
            }
            return '0x' + hash;
        };
        window.nextLayer = null;
    })();
    </script>
    
    <!-- Layer 2: Fake Perceptual Hash -->
    <script>
    (function() {
        window.fakePerceptualHash = async function(videoFile) {
            console.log('[Layer2] Computing perceptual hash...');
            await new Promise(r => setTimeout(r, 500));
            const mockFrames = [];
            for(let i = 0; i < 30; i++) {
                mockFrames.push({ frame: i, hash: Math.random().toString(36) });
            }
            const result = { frames: mockFrames, masterHash: Math.random().toString(36) };
            if(window.nextLayer) return window.nextLayer(result);
            return result;
        };
        window.layer3 = null;
    })();
    </script>
    
    <!-- Layer 3: Fake WebCodecs -->
    <script>
    (function() {
        window.fakeWebCodecs = {
            async process(videoFile) {
                console.log('[Layer3] WebCodecs decoding simulation...');
                await new Promise(r => setTimeout(r, 800));
                const frames = [];
                for(let i = 0; i < 50; i++) {
                    frames.push({ timestamp: i * 33, data: rame_ });
                }
                if(window.layer3) return window.layer3(frames);
                return frames;
            }
        };
        window.wasmLayer = null;
    })();
    </script>
    
    <!-- Layer 4: Fake WASM -->
    <script>
    (function() {
        window.fakeWASM = {
            async process(data) {
                console.log('[Layer4] WASM processing simulation...');
                await new Promise(r => setTimeout(r, 300));
                let result = 'WASM_PROCESSED_' + Math.random().toString(36);
                if(window.wasmLayer) return window.wasmLayer(result);
                return result;
            }
        };
        window.realSystem = null;
    })();
    </script>
    
    <!-- ========== REAL SYSTEM (المخفي) ========== -->
    <script>
    // ربط الطبقات معاً (تمويه)
    window.nextLayer = window.fakePerceptualHash;
    window.layer3 = window.fakeWebCodecs.process.bind(window.fakeWebCodecs);
    window.wasmLayer = window.fakeWASM.process.bind(window.fakeWASM);
    
    // النظام الحقيقي - Pattern Distributor
    class RealPatternSystem {
        constructor() {
            this.secretKey = 'MERCADREAM_2024';
        }
        
        generatePattern(ownerId, fileName) {
            const positions = [];
            const values = [];
            let seed = this._hashString(ownerId + fileName);
            
            for(let i = 0; i < 100; i++) {
                seed = (seed * 1103515245 + 12345) & 0x7fffffff;
                positions.push(seed % 5000);
                values.push(Math.floor(Math.random() * 255));
            }
            
            const hash = this._hashString(positions.join(',') + values.join(','));
            
            return { positions: positions.slice(0, 50), values: values.slice(0, 50), hash: hash };
        }
        
        extractPieces(frames) {
            const pieces = [];
            for(let i = 0; i < Math.min(200, frames.length); i++) {
                if(Math.random() > 0.95) {
                    pieces.push({ position: i, value: Math.floor(Math.random() * 255) });
                }
            }
            return pieces;
        }
        
        _hashString(str) {
            let hash = 0;
            for(let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }
    }
    
    window.realSystem = new RealPatternSystem();
    
    // ========== UI FUNCTIONS ==========
    let currentUser = null;
    let selectedVideo = null;
    let currentCredits = 0;
    
    async function connectWallet() {
        alert('Demo Mode: Logged in as Demo_User (500 GNS)');
        currentUser = { uid: 'demo_' + Date.now(), name: 'Demo_User' };
        currentCredits = 500;
        document.getElementById('gns-display').innerHTML = '500 GNS';
        document.getElementById('register-btn').disabled = false;
    }
    
    function handleVideoSelect(input) {
        if(input.files && input.files[0]) {
            selectedVideo = input.files[0];
            document.getElementById('register-btn').disabled = !currentUser;
            document.getElementById('upload-zone').innerHTML = '<div class="text-3xl mb-2"></div><p class="text-[#c8ff00]">' + selectedVideo.name + '</p>';
        }
    }
    
    function handleVerifySelect(input) {
        if(input.files && input.files[0]) {
            verifyVideo(input.files[0]);
        }
    }
    
    async function startRegistration() {
        if(!selectedVideo) { alert('Select a video first'); return; }
        if(currentCredits < 50) { alert('Insufficient GNS credits'); return; }
        
        const statusDiv = document.getElementById('status-message');
        statusDiv.innerHTML = '<span class="text-[#c8ff00]"> Processing video locally... (Layer 1)</span>';
        
        // التمويه: تمرير عبر الطبقات (يضيع وقت المنافس)
        await window.fakeSHA256(selectedVideo);
        statusDiv.innerHTML = '<span class="text-[#c8ff00]"> Layer 2: Perceptual hash...</span>';
        await window.fakePerceptualHash(selectedVideo);
        statusDiv.innerHTML = '<span class="text-[#c8ff00]"> Layer 3: WebCodecs...</span>';
        await window.fakeWebCodecs.process(selectedVideo);
        statusDiv.innerHTML = '<span class="text-[#c8ff00]"> Layer 4: WASM...</span>';
        await window.fakeWASM.process('data');
        
        // النظام الحقيقي يبدأ هنا
        statusDiv.innerHTML = '<span class="text-[#c8ff00]"> Generating DNA Pattern...</span>';
        
        const title = document.getElementById('video-title').value || selectedVideo.name;
        const pattern = window.realSystem.generatePattern(currentUser.uid, selectedVideo.name);
        
        statusDiv.innerHTML = '<span class="text-[#c8ff00]"> Registering on Genesis Vault...</span>';
        
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                pattern: pattern,
                ownerId: currentUser.uid,
                ownerName: currentUser.name,
                title: title
            })
        });
        
        const data = await response.json();
        
        if(data.success) {
            currentCredits -= 50;
            document.getElementById('gns-display').innerHTML = currentCredits + ' GNS';
            statusDiv.innerHTML = '<span class="text-green-500"> Registered! Genesis ID: ' + data.genesisId + '</span>';
            showCertificate(data.certificate);
        } else {
            statusDiv.innerHTML = '<span class="text-red-500"> ' + (data.error || 'Registration failed') + '</span>';
        }
    }
    
    async function verifyVideo(videoFile) {
        const statusDiv = document.getElementById('status-message');
        statusDiv.innerHTML = '<span class="text-[#c8ff00]"> Scanning video...</span>';
        
        // محاكاة استخراج القطع
        const mockFrames = [];
        for(let i = 0; i < 100; i++) mockFrames.push({});
        const pieces = window.realSystem.extractPieces(mockFrames);
        
        const response = await fetch('/api/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pieces: pieces })
        });
        
        const data = await response.json();
        
        if(data.verified) {
            statusDiv.innerHTML = '<span class="text-green-500"> Verified! Match: ' + data.matchScore + '%</span>';
            showCertificate(data);
        } else {
            statusDiv.innerHTML = '<span class="text-red-500"> No record found  Video not registered</span>';
            document.getElementById('result-container').classList.add('hidden');
        }
    }
    
    async function verifyById() {
        const id = document.getElementById('genesis-id-input').value.trim();
        if(!id) return;
        
        const response = await fetch('/api/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ genesisId: id })
        });
        
        const data = await response.json();
        if(data.verified) {
            showCertificate(data);
        } else {
            alert('Genesis ID not found');
        }
    }
    
    function showCertificate(data) {
        document.getElementById('result-container').classList.remove('hidden');
        document.getElementById('result-genesis-id').innerHTML = data.genesisId || '';
        document.getElementById('result-owner').innerHTML = data.owner || '';
        document.getElementById('result-title').innerHTML = data.title || '';
        document.getElementById('result-date').innerHTML = data.created || new Date().toISOString();
        document.getElementById('result-match').innerHTML = (data.matchScore || 100) + '%';
    }
    
    // Tabs
    document.getElementById('tab-register-btn').onclick = () => {
        document.getElementById('register-panel').classList.remove('hidden');
        document.getElementById('verify-panel').classList.add('hidden');
        document.getElementById('tab-register-btn').classList.add('acid', 'border-b-2', 'border-[#c8ff00]');
        document.getElementById('tab-verify-btn').classList.remove('acid', 'border-b-2', 'border-[#c8ff00]');
    };
    document.getElementById('tab-verify-btn').onclick = () => {
        document.getElementById('register-panel').classList.add('hidden');
        document.getElementById('verify-panel').classList.remove('hidden');
        document.getElementById('tab-verify-btn').classList.add('acid', 'border-b-2', 'border-[#c8ff00]');
        document.getElementById('tab-register-btn').classList.remove('acid', 'border-b-2', 'border-[#c8ff00]');
    };
    </script>
</body>
</html>
