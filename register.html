<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBjVzVwEa5tTOjsYtsCB2h3kcqUhyxYOTg",
        authDomain: "mercadream-4b4b3.firebaseapp.com",
        projectId: "mercadream-4b4b3",
        storageBucket: "mercadream-4b4b3.firebasestorage.app",
        messagingSenderId: "257560928442",
        appId: "1:257560928442:web:06983f27629a13eeed6283",
        measurementId: "G-F0CLDJCV42"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Session Check
    auth.onAuthStateChanged(function(user) {
        if (user) {
            console.log('User is signed in:', user.email);
            saveSessionAndRedirect(user);
        }
    });

    function showAlert(msg, type) {
        var el = document.getElementById('alert');
        el.textContent = msg;
        el.className = 'alert show ' + (type || 'err');
    }

    function hideAlert() {
        var el = document.getElementById('alert');
        el.className = 'alert';
    }

    async function saveSessionAndRedirect(user) {
        const email = user.email;
        const fullName = user.displayName || email.split('@')[0];

        localStorage.setItem('sb_session', 'true');
        localStorage.setItem('md_email', email);
        localStorage.setItem('md_name', fullName);
        localStorage.setItem('md_user', JSON.stringify(user));
        localStorage.setItem('md_user_id', user.uid);
        localStorage.setItem('md_logged_in_at', Date.now().toString());

        try {
            const crRes = await fetch('/api/credits', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'check', 
                    email: email, 
                    name: fullName 
                })
            });
            const crData = await crRes.json();
            
            if (crData && !crData.error) {
                localStorage.setItem('md_credits', crData.balance !== undefined ? crData.balance : '0');
                localStorage.setItem('md_plan', crData.type || 'free');
            } else {
                localStorage.setItem('md_credits', '0');
                localStorage.setItem('md_plan', 'free');
            }
        } catch (err) {
            console.warn('Credits sync failed:', err);
            localStorage.setItem('md_credits', '0');
            localStorage.setItem('md_plan', 'free');
        }

        window.location.href = 'profile.html';
    }

    async function signIn() {
        var email = document.getElementById('email').value.trim();
        var pass = document.getElementById('password').value;
        
        if (!email || !pass) {
            showAlert('Enter email and password.');
            return;
        }

        var btn = document.getElementById('signInBtn');
        var originalText = btn.textContent;
        btn.textContent = 'AUTHENTICATING...';
        btn.disabled = true;
        hideAlert();

        try {
            const result = await auth.signInWithEmailAndPassword(email, pass);
        } catch (error) {
            console.error('Login error:', error);
            showAlert(error.message);
            btn.textContent = originalText;
            btn.disabled = false;
        }
    }

    async function signInGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            await auth.signInWithPopup(provider);
        } catch (error) {
            console.error('Google Sign-In Error:', error);
            showAlert(error.message);
        }
    }

    async function forgotPw() {
        var email = document.getElementById('email').value.trim();
        if (!email) {
            showAlert('Enter your email first.');
            return;
        }
        try {
            await auth.sendPasswordResetEmail(email);
            showAlert('Check your email for a reset link.', 'ok');
        } catch (error) {
            showAlert(error.message);
        }
    }
</script>
