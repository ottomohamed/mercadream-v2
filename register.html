<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MERCADREAM | Neural Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0e0e0e;
            overflow: hidden;
            height: 100vh;
        }
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            object-fit: cover;
            opacity: 0.8;
        }
        .video-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(6,6,6,0.4) 100%);
            z-index: -1;
        }
        .surgical-border {
            border: 1px solid #353534;
            position: relative;
        }
        .surgical-border::before {
            content: '';
            position: absolute;
            top: -1px;
            right: 0px;
            width: 20px;
            height: 1px;
            background: #c0f500;
        }
        .surgical-border::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0px;
            width: 20px;
            height: 1px;
            background: #c0f500;
        }
        input {
            background: rgba(10, 10, 10, 0.8) !important;
            border: 1px solid #2a2a2a !important;
            color: #e2e4d1 !important;
        }
        input:focus {
            border-color: #c0f500 !important;
            outline: none;
        }
        .btn-main {
            background: linear-gradient(180deg, #d4ff2e 0%, #a8d700 100%);
            box-shadow: 0 4px 15px rgba(168, 215, 0, 0.3);
            transition: all 0.2s ease;
        }
        .btn-main:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(168, 215, 0, 0.4);
        }
        .btn-main:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body class="flex flex-col text-on-surface">

    <video autoplay muted loop playsinline class="video-background">
        <source src="media/hero4.mp4" type="video/mp4"/>
    </video>
    <div class="video-overlay"></div>

    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-10 py-6">
        <div class="font-display text-2xl font-bold tracking-tighter text-primary-fixed uppercase">
            MercaDream
        </div>
        <div class="text-[10px] text-on-surface-variant uppercase tracking-widest opacity-60">
            System_V.04.1_Live
        </div>
    </header>

    <main class="flex-grow flex items-center justify-end px-10 md:px-20 lg:px-32">
        <div class="w-full max-w-[420px] z-10">
            <div class="surgical-border bg-surface-container/90 backdrop-blur-xl p-8 md:p-10 shadow-2xl">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h1 class="font-display text-lg font-bold text-white mb-1 uppercase tracking-widest">Initialize Account</h1>
                        <p class="text-[10px] text-on-surface-variant uppercase tracking-widest">Entity_Registration_Protocol</p>
                    </div>
                    <div class="text-primary-fixed opacity-40">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 11c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zM12 13c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"/></svg>
                    </div>
                </div>

                <div class="space-y-5">
                    <button class="w-full bg-white text-black font-bold py-3 text-xs flex items-center justify-center gap-3 transition-all hover:bg-gray-100" id="googleSignUp">
                        <svg class="w-4 h-4" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
                        SIGN UP WITH GOOGLE
                    </button>

                    <div class="relative flex items-center py-2">
                        <div class="flex-grow border-t border-outline-variant/30"></div>
                        <span class="flex-shrink mx-4 text-[10px] text-on-surface-variant tracking-[0.3em] uppercase">OR</span>
                        <div class="flex-grow border-t border-outline-variant/30"></div>
                    </div>

                    <form class="space-y-4" id="registerForm">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[9px] text-on-surface-variant uppercase tracking-widest mb-1.5 block">First Name</label>
                                <input class="w-full px-4 py-3 text-xs" id="firstName" placeholder="Marco" required type="text"/>
                            </div>
                            <div>
                                <label class="text-[9px] text-on-surface-variant uppercase tracking-widest mb-1.5 block">Last Name</label>
                                <input class="w-full px-4 py-3 text-xs" id="lastName" placeholder="Cielo" required type="text"/>
                            </div>
                        </div>
                        <div>
                            <label class="text-[9px] text-on-surface-variant uppercase tracking-widest mb-1.5 block">Email</label>
                            <input class="w-full px-4 py-3 text-xs" id="email" placeholder="name@domain.com" required type="email"/>
                        </div>
                        <div>
                            <label class="text-[9px] text-on-surface-variant uppercase tracking-widest mb-1.5 block">Password</label>
                            <input class="w-full px-4 py-3 text-xs" id="password" placeholder="Min. 6 characters" required type="password"/>
                        </div>
                        
                        <button class="w-full btn-main text-black font-bold py-4 text-xs uppercase tracking-[0.2em] mt-2 flex items-center justify-center gap-2" type="submit">
                            Authorize Creation
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                        </button>
                    </form>
                </div>

                <div class="mt-8 text-center border-t border-outline-variant/20 pt-6">
                    <p class="text-[10px] text-on-surface-variant uppercase tracking-widest">
                        Existing Account? <a class="text-primary-fixed hover:underline ml-2" href="login.html">Sign In</a>
                    </p>
                </div>
            </div>
            <div class="mt-4 flex justify-between text-[9px] text-on-surface-variant/40 px-2 uppercase tracking-widest">
                <span>Coord: [40.7128° N, 74.0060° W]</span>
                <span>Security: AES-256-GCM</span>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full px-10 py-6 flex flex-col md:flex-row justify-between items-center gap-4 bg-surface-container-lowest/80 backdrop-blur-md border-t border-outline-variant">
        <div class="text-[10px] text-primary-fixed uppercase tracking-[0.2em]">
             2024 MERCADREAM // SYSTEM_STATUS: OPERATIONAL
        </div>
        <div class="flex gap-6 text-[9px] text-on-surface-variant uppercase tracking-widest">
            <a class="hover:text-primary-fixed transition-colors underline" href="#">Neural Engine</a>
            <a class="hover:text-primary-fixed transition-colors underline" href="#">Privacy Protocol</a>
            <a class="hover:text-primary-fixed transition-colors underline" href="#">Terms of Service</a>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjVzVwEa5tTOjsYtsCB2h3kcqUhyxYOTg",
            authDomain: "mercadream-4b4b3.firebaseapp.com",
            projectId: "mercadream-4b4b3",
            storageBucket: "mercadream-4b4b3.firebasestorage.app",
            messagingSenderId: "257560928442",
            appId: "1:257560928442:web:06983f27629a13eeed6283",
            measurementId: "G-F0CLDJCV42"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        function showAlert(message, isError = true) {
            const alertDiv = document.createElement('div');
            alertDiv.textContent = message;
            alertDiv.style.cssText = `
                position: fixed; bottom: 20px; right: 20px; z-index: 1000;
                background: ${isError ? '#ff4444' : '#00ff88'}; color: black;
                padding: 12px 24px; border-radius: 4px; font-size: 12px;
                font-family: monospace;
            `;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }

        // إنشاء مستند جديد في Firestore للمستخدم
        async function createUserDocument(user, firstName, lastName) {
            const userRef = doc(db, "users", user.uid);
            await setDoc(userRef, {
                name: firstName + " " + lastName,
                email: user.email,
                credits: 0,
                plan: "free",
                renders: 0,
                recharges: 0,
                assets: 0,
                createdAt: new Date().toISOString()
            });
            console.log(" Firestore document created for:", user.uid);
        }

        // Google Sign Up
        document.getElementById('googleSignUp').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;
                
                // إنشاء وثيقة في Firestore للمستخدم الجديد
                const firstName = user.displayName?.split(' ')[0] || user.email.split('@')[0];
                const lastName = user.displayName?.split(' ')[1] || "";
                await createUserDocument(user, firstName, lastName);
                
                localStorage.setItem('sb_session', 'true');
                localStorage.setItem('md_email', user.email);
                localStorage.setItem('md_user_id', user.uid);
                localStorage.setItem('md_name', user.displayName || user.email.split('@')[0]);
                localStorage.setItem('md_credits', '0');
                localStorage.setItem('md_plan', 'free');
                
                showAlert('Account created successfully! Redirecting...', false);
                setTimeout(() => window.location.href = 'profile.html', 1500);
            } catch (error) {
                showAlert(error.message);
            }
        };

        // Email/Password Registration
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const submitBtn = e.target.querySelector('button');
            const originalText = submitBtn.innerHTML;
            
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'CREATING...';
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // إنشاء وثيقة في Firestore للمستخدم الجديد
                await createUserDocument(user, firstName, lastName);
                
                localStorage.setItem('sb_session', 'true');
                localStorage.setItem('md_email', user.email);
                localStorage.setItem('md_user_id', user.uid);
                localStorage.setItem('md_name', firstName + ' ' + lastName);
                localStorage.setItem('md_credits', '0');
                localStorage.setItem('md_plan', 'free');
                
                showAlert('Account created! Redirecting...', false);
                setTimeout(() => window.location.href = 'profile.html', 1500);
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    showAlert('Email already exists. Please sign in instead.');
                } else {
                    showAlert(error.message);
                }
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        };
    </script>
</body>
</html>
