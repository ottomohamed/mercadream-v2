<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MercaDream - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#060606;color:#e2e4d1;font-family:'IBM Plex Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .box{background:#0a0a0a;border:1px solid #1a1a1a;padding:32px;width:100%;max-width:420px;border-radius:8px}
        input{width:100%;padding:12px;margin:10px 0;background:#1a1a1a;border:1px solid #333;color:white;border-radius:4px}
        button{width:100%;padding:14px;background:#a8d700;border:none;color:#060606;font-weight:700;cursor:pointer;border-radius:4px;margin-top:10px}
        button:hover{background:#c8ff00}
        h1{text-align:center;color:#a8d700;margin-bottom:20px}
        .field-label{font-size:12px;color:#888;margin-bottom:5px;display:block}
        .alert{padding:10px;margin-top:10px;border-radius:4px;display:none}
        .alert.show{display:block}
        .alert.err{background:rgba(255,68,68,0.2);border:1px solid #ff4444;color:#ff4444}
        .alert.ok{background:rgba(168,215,0,0.2);border:1px solid #a8d700;color:#a8d700}
    </style>
</head>
<body>
<div class="box">
    <h1> MERCADREAM</h1>
    <h3 style="text-align:center; margin-bottom:20px;">Create Account</h3>
    
    <div id="emailRegisterForm">
        <label class="field-label">Email</label>
        <input type="email" id="regEmail" placeholder="your@email.com">
        
        <label class="field-label">Password</label>
        <input type="password" id="regPassword" placeholder="Min 6 characters">
        
        <button id="registerBtn">CREATE ACCOUNT</button>
    </div>
    
    <div style="text-align:center; margin:15px 0; color:#444;">OR</div>
    
    <button id="googleRegisterBtn"> Sign up with Google</button>
    
    <div id="alert" class="alert"></div>
    
    <div style="text-align:center; margin-top:20px; font-size:12px;">
        Already have an account? <a href="login.html" style="color:#a8d700;">Sign In</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBjVzVwEa5tTOjsYtsCB2h3kcqUhyxYOTg",
        authDomain: "mercadream-4b4b3.firebaseapp.com",
        projectId: "mercadream-4b4b3",
        storageBucket: "mercadream-4b4b3.firebasestorage.app",
        messagingSenderId: "257560928442",
        appId: "1:257560928442:web:06983f27629a13eeed6283",
        measurementId: "G-F0CLDJCV42"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    function showAlert(msg, type) {
        const alertDiv = document.getElementById('alert');
        alertDiv.textContent = msg;
        alertDiv.className = 'alert show ' + (type || 'err');
        setTimeout(() => {
            alertDiv.className = 'alert';
        }, 3000);
    }

    // تسجيل بالبريد الإلكتروني وكلمة المرور
    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        
        if (!email || !password) {
            showAlert('Please enter email and password');
            return;
        }
        
        if (password.length < 6) {
            showAlert('Password must be at least 6 characters');
            return;
        }
        
        try {
            const result = await createUserWithEmailAndPassword(auth, email, password);
            localStorage.setItem('sb_session', 'true');
            localStorage.setItem('md_email', result.user.email);
            localStorage.setItem('md_user_id', result.user.uid);
            showAlert('Account created successfully! Redirecting...', 'ok');
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 1500);
        } catch (error) {
            if (error.code === 'auth/email-already-in-use') {
                showAlert('Email already exists. Please sign in instead.');
            } else {
                showAlert(error.message);
            }
        }
    };
    
    // تسجيل بـ Google
    document.getElementById('googleRegisterBtn').onclick = async () => {
        try {
            const result = await signInWithPopup(auth, googleProvider);
            localStorage.setItem('sb_session', 'true');
            localStorage.setItem('md_email', result.user.email);
            localStorage.setItem('md_user_id', result.user.uid);
            localStorage.setItem('md_name', result.user.displayName);
            showAlert('Account created successfully! Redirecting...', 'ok');
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 1500);
        } catch (error) {
            showAlert(error.message);
        }
    };
</script>
</body>
</html>
