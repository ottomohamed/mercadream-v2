<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBjVzVwEa5tTOjsYtsCB2h3kcqUhyxYOTg",
        authDomain: "mercadream-4b4b3.firebaseapp.com",
        projectId: "mercadream-4b4b3",
        storageBucket: "mercadream-4b4b3.firebasestorage.app",
        messagingSenderId: "257560928442",
        appId: "1:257560928442:web:06983f27629a13eeed6283",
        measurementId: "G-F0CLDJCV42"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const handleSuccess = (user) => {
        localStorage.setItem('sb_session', 'true');
        localStorage.setItem('md_email', user.email);
        localStorage.setItem('md_user', JSON.stringify({
            uid: user.uid,
            displayName: user.displayName,
            email: user.email
        }));
        localStorage.setItem('md_user_id', user.uid);
        localStorage.setItem('md_name', user.displayName || user.email.split('@')[0]);
        window.location.href = 'profile.html';
    };

    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submitBtn');
        const originalContent = btn.innerHTML;
        
        btn.disabled = true;
        btn.innerHTML = `<span class="flex items-center gap-2">VERIFYING_CREDENTIALS... <span class="animate-pulse">_</span></span>`;
        
        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            handleSuccess(userCredential.user);
        } catch (error) {
            alert(`ERROR: ${error.message}`);
            btn.innerHTML = originalContent;
            btn.disabled = false;
        }
    });

    const googleBtn = document.getElementById('googleSignIn');
    googleBtn.addEventListener('click', async () => {
        googleBtn.classList.add('opacity-50');
        googleBtn.disabled = true;
        try {
            const result = await signInWithPopup(auth, provider);
            handleSuccess(result.user);
        } catch (error) {
            alert(`ERROR: ${error.message}`);
            googleBtn.classList.remove('opacity-50');
            googleBtn.disabled = false;
        }
    });

    document.addEventListener('mousemove', (e) => {
        const glow = document.getElementById('glowEffect');
        if (glow) {
            const moveX = (e.clientX - window.innerWidth / 2) / 40;
            const moveY = (e.clientY - window.innerHeight / 2) / 40;
            glow.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
        }
    });
</script>
