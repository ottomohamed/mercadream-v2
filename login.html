<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MercaDream - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjVzVwEa5tTOjsYtsCB2h3kcqUhyxYOTg",
            authDomain: "mercadream-4b4b3.firebaseapp.com",
            projectId: "mercadream-4b4b3",
            storageBucket: "mercadream-4b4b3.firebasestorage.app",
            messagingSenderId: "257560928442",
            appId: "1:257560928442:web:06983f27629a13eeed6283",
            measurementId: "G-F0CLDJCV42"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAuth = auth;
        window.firebaseProvider = provider;
        window.signInWithGoogle = async function() {
            try {
                const result = await signInWithPopup(auth, provider);
                localStorage.setItem('sb_session', 'true');
                localStorage.setItem('md_email', result.user.email);
                localStorage.setItem('md_user', JSON.stringify(result.user));
                window.location.href = 'profile.html';
            } catch (error) {
                alert('Login error: ' + error.message);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user && window.location.pathname.includes('login')) {
                window.location.href = 'profile.html';
            }
        });
    </script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#060606;color:#e2e4d1;font-family:'IBM Plex Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .box{background:#0a0a0a;border:1px solid #1a1a1a;padding:32px;width:100%;max-width:420px;border-radius:8px}
        button{width:100%;padding:14px;background:#a8d700;border:none;color:#060606;font-weight:700;cursor:pointer;border-radius:4px}
        button:hover{background:#c8ff00}
        h1{text-align:center;color:#a8d700;margin-bottom:20px}
    </style>
</head>
<body>
<div class="box">
    <h1>MERCADREAM</h1>
    <button onclick="signInWithGoogle()"> Sign in with Google</button>
</div>
</body>
</html>
