<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/><meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<title>MERCADREAM // NEURAL_AUDIO</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
body{background:#0e0e0e;background-image:linear-gradient(rgba(200,255,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(200,255,0,.03) 1px,transparent 1px);background-size:32px 32px;overflow-x:hidden;min-height:max(884px,100dvh);}
.scanline{width:100%;height:2px;background:#C8FF00;opacity:.3;position:fixed;top:0;left:0;z-index:100;pointer-events:none;animation:scan 6s linear infinite;box-shadow:0 0 10px #C8FF00;}
@keyframes scan{0%{transform:translateY(-100px)}100%{transform:translateY(110vh)}}
.glass-panel{backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.05);background:rgba(20,20,20,.6);}
.audio-bar{animation:bar-dance 1.5s ease-in-out infinite alternate;}
@keyframes bar-dance{0%{height:20%}50%{height:80%}100%{height:40%}}
::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:#C8FF0033}
.spinner{animation:spin 1s linear infinite} @keyframes spin{to{transform:rotate(360deg)}}
</style>
<script>
tailwind.config={darkMode:"class",theme:{extend:{colors:{
  "acid-green":"#C8FF00","on-surface":"#e5e2e1","on-surface-variant":"#c4caac",
  "outline-variant":"#434933","surface":"#131313","surface-container":"#201f1f",
  "background":"#131313","primary-fixed":"#c0f500","muted-silver":"#A0A0A0"
}}}}
</script>
</head>
<body class="text-on-surface pb-32">
<div class="scanline"></div>
<header class="fixed top-0 w-full z-50 bg-background/60 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-4 py-4">
  <div class="flex items-center gap-3">
    <span class="material-symbols-outlined text-acid-green" style="font-variation-settings:'FILL' 1;">settings_input_component</span>
    <h1 style="font-family:Orbitron;font-size:16px;font-weight:700;letter-spacing:0.2em;color:#C8FF00;">MERCADREAM // NEURAL_AUDIO</h1>
  </div>
  <div id="gns-credits" style="font-family:IBM Plex Mono;color:#C8FF00;background:rgba(200,255,0,.1);padding:6px 12px;border:1px solid rgba(200,255,0,.2);">0 GNS</div>
</header>

<main class="mt-20 px-4 max-w-2xl mx-auto space-y-6">
  <!-- Waveform -->
  <section class="glass-panel p-6 relative overflow-hidden h-48 flex items-end justify-between gap-1">
    <div class="absolute top-2 left-2" style="font-family:IBM Plex Mono;font-size:9px;color:rgba(200,255,0,.5);text-transform:uppercase;">FREQ_ANALYSIS // 44.1KHZ</div>
    <div class="absolute top-2 right-2" style="font-family:IBM Plex Mono;font-size:9px;color:rgba(200,255,0,.5);text-transform:uppercase;">LATENCY: 1.2MS</div>
    <div class="audio-bar w-full bg-acid-green/40" style="animation-delay:.1s;height:30%"></div>
    <div class="audio-bar w-full bg-acid-green/60" style="animation-delay:.3s;height:60%"></div>
    <div class="audio-bar w-full bg-acid-green" style="animation-delay:.2s;height:80%"></div>
    <div class="audio-bar w-full bg-acid-green/80" style="animation-delay:.5s;height:50%"></div>
    <div class="audio-bar w-full bg-acid-green/30" style="animation-delay:.4s;height:90%"></div>
    <div class="audio-bar w-full bg-acid-green/60" style="animation-delay:.7s;height:40%"></div>
    <div class="audio-bar w-full bg-acid-green" style="animation-delay:.1s;height:70%"></div>
    <div class="audio-bar w-full bg-acid-green/50" style="animation-delay:.6s;height:60%"></div>
    <div class="audio-bar w-full bg-acid-green/80" style="animation-delay:.2s;height:45%"></div>
    <div class="audio-bar w-full bg-acid-green" style="animation-delay:.4s;height:85%"></div>
    <div class="audio-bar w-full bg-acid-green/40" style="animation-delay:.8s;height:35%"></div>
    <div class="audio-bar w-full bg-acid-green/70" style="animation-delay:.3s;height:55%"></div>
    <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-acid-green/40"></div>
    <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-acid-green/40"></div>
    <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-acid-green/40"></div>
    <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-acid-green/40"></div>
  </section>

  <!-- Input -->
  <section class="space-y-2">
    <div class="flex justify-between items-end">
      <label style="font-family:IBM Plex Mono;font-size:11px;text-transform:uppercase;letter-spacing:0.2em;color:#C8FF00;">AUDIO_INPUT_STREAM</label>
      <span style="font-family:IBM Plex Mono;font-size:9px;color:#A0A0A0;text-transform:uppercase;">25 GNS / TRACK</span>
    </div>
    <div class="glass-panel p-4">
      <textarea id="prompt-input" class="w-full bg-transparent border-none resize-none h-24 focus:ring-0" style="color:#C8FF00;font-family:IBM Plex Mono;font-size:13px;" placeholder="Industrial Techno, 140bpm, heavy bass, metallic percussion...">Industrial Techno, 140bpm, heavy bass, metallic percussion, rhythmic distortion</textarea>
    </div>
  </section>

  <!-- Execute -->
  <button id="execute-forge-btn" class="w-full py-4 font-bold uppercase flex items-center justify-center gap-3 active:scale-95 transition-all" style="background:#C8FF00;color:#0e0e0e;font-family:Orbitron;letter-spacing:0.2em;">
    <span class="material-symbols-outlined">auto_awesome</span>
    EXECUTE_FORGE — 25 GNS
  </button>

  <!-- Terminal -->
  <section class="space-y-2">
    <div style="font-family:IBM Plex Mono;font-size:11px;text-transform:uppercase;letter-spacing:0.2em;color:#A0A0A0;">TERMINAL_READOUT</div>
    <div id="terminal-log" class="bg-black/80 border border-white/5 p-4 h-32 overflow-y-auto" style="font-family:IBM Plex Mono;font-size:10px;">
      <div style="color:rgba(200,255,0,.6)">&gt;&gt; SYSTEM_READY... AWAITING_INPUT</div>
    </div>
  </section>

  <!-- Player -->
  <section class="glass-panel p-6 space-y-4">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-4">
        <button id="play-btn" class="w-12 h-12 rounded-full border flex items-center justify-center transition-colors" style="border-color:rgba(200,255,0,.4);color:#C8FF00;">
          <span class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL' 1;">play_arrow</span>
        </button>
        <div>
          <div id="player-filename" style="font-family:IBM Plex Mono;font-size:11px;color:#C8FF00;text-transform:uppercase;">AWAITING_FORGE...</div>
          <div id="player-meta" style="font-family:IBM Plex Mono;font-size:9px;color:#A0A0A0;text-transform:uppercase;">--:-- / --:--</div>
        </div>
      </div>
    </div>
    <div class="relative w-full h-1 bg-white/5 overflow-hidden">
      <div id="progress-bar" class="absolute left-0 top-0 h-full" style="background:#C8FF00;box-shadow:0 0 8px rgba(200,255,0,.8);width:0%"></div>
    </div>
    <audio id="audio-player" class="hidden"></audio>
  </section>
</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 border-t z-50" style="background:rgba(19,19,19,.8);backdrop-filter:blur(16px);border-color:rgba(200,255,0,.3);">
  <a href="audio.html" class="flex flex-col items-center text-acid-green border-t-2 border-acid-green pt-2">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">auto_awesome</span>
    <span style="font-family:IBM Plex Mono;font-size:11px;letter-spacing:.15em;text-transform:uppercase;">Forge</span>
  </a>
  <a href="verify.html" class="flex flex-col items-center text-muted-silver pt-2 hover:text-acid-green transition-all">
    <span class="material-symbols-outlined">inventory_2</span>
    <span style="font-family:IBM Plex Mono;font-size:11px;letter-spacing:.15em;text-transform:uppercase;">Vault</span>
  </a>
  <a href="ledger.html" class="flex flex-col items-center text-muted-silver pt-2 hover:text-acid-green transition-all">
    <span class="material-symbols-outlined">account_balance_wallet</span>
    <span style="font-family:IBM Plex Mono;font-size:11px;letter-spacing:.15em;text-transform:uppercase;">Ledger</span>
  </a>
  <a href="studio.html" class="flex flex-col items-center text-muted-silver pt-2 hover:text-acid-green transition-all">
    <span class="material-symbols-outlined">movie_filter</span>
    <span style="font-family:IBM Plex Mono;font-size:11px;letter-spacing:.15em;text-transform:uppercase;">Studio</span>
  </a>
</nav>

<script>
var AUDIO_COST = 25;
var currentUser = null;

firebase.initializeApp({
  apiKey:"AIzaSyBjVzVwEa5tTOjsYtsCB2h3kcqUhyxYOTg",
  authDomain:"mercadream-4b4b3.firebaseapp.com",
  projectId:"mercadream-4b4b3",
  storageBucket:"mercadream-4b4b3.firebasestorage.app",
  messagingSenderId:"257560928442",
  appId:"1:257560928442:web:06983f27629a13eeed6283"
});

firebase.auth().onAuthStateChanged(function(user) {
  currentUser = user;
  if (user) {
    firebase.firestore().collection('users').doc(user.uid).onSnapshot(function(doc) {
      if (!doc.exists) return;
      var gns = doc.data().credits || 0;
      localStorage.setItem('md_credits', gns);
      localStorage.setItem('md_user_id', user.uid);
      document.getElementById('gns-credits').textContent = gns.toLocaleString() + ' GNS';
    });
  }
});

function appendLog(text, type) {
  var div = document.createElement('div');
  div.style.color = type === 'error' ? '#ff4444' : 'rgba(200,255,0,.8)';
  div.textContent = '>> ' + text;
  var log = document.getElementById('terminal-log');
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

document.getElementById('execute-forge-btn').addEventListener('click', async function() {
  var prompt = document.getElementById('prompt-input').value.trim();
  if (!prompt) return;
  
  var gns = parseInt(localStorage.getItem('md_credits') || '0');
  if (gns < AUDIO_COST) {
    appendLog('INSUFFICIENT GNS — NEED ' + AUDIO_COST, 'error');
    setTimeout(function() { window.location.href = 'pricing.html'; }, 1500);
    return;
  }
  
  var btn = document.getElementById('execute-forge-btn');
  btn.disabled = true;
  btn.style.background = '#8aad00';
  btn.textContent = 'FORGING...';
  appendLog('INITIALIZING_NEURAL_AUDIO...');
  
  try {
    var res = await fetch('/api/audioforge', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'generate', prompt })
    });
    var data = await res.json();
    
    if (data.error) {
      appendLog('ERROR: ' + data.error, 'error');
      btn.disabled = false; btn.style.background = '#C8FF00'; btn.textContent = 'EXECUTE_FORGE — 25 GNS';
      return;
    }
    
    // Deduct GNS
    var newGns = gns - AUDIO_COST;
    localStorage.setItem('md_credits', newGns);
    if (currentUser) firebase.firestore().collection('users').doc(currentUser.uid).update({ credits: newGns });
    
    appendLog('JOB_ID: ' + data.jobId);
    
    var attempts = 0;
    var poll = setInterval(async function() {
      attempts++;
      if (attempts > 60) {
        clearInterval(poll);
        appendLog('TIMEOUT', 'error');
        btn.disabled = false; btn.style.background = '#C8FF00'; btn.textContent = 'EXECUTE_FORGE — 25 GNS';
        return;
      }
      btn.textContent = 'PROCESSING [' + attempts + ']...';
      try {
        var pr = await fetch('/api/audioforge', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ action: 'poll', jobId: data.jobId })
        });
        var pd = await pr.json();
        if (pd.status === 'completed' && pd.audioUrl) {
          clearInterval(poll);
          appendLog('NEURAL_AUDIO_COMPLETE');
          var player = document.getElementById('audio-player');
          player.src = pd.audioUrl;
          document.getElementById('player-filename').textContent = 'FORGE_' + data.jobId.substring(0,6).toUpperCase() + '.WAV';
          document.getElementById('player-meta').textContent = '00:00 / ' + (pd.duration||'00:30') + ' // 44.1KHZ';
          btn.disabled = false; btn.style.background = '#C8FF00'; btn.textContent = '✓ COMPLETE — FORGE AGAIN';
        }
      } catch(e) {}
    }, 3000);
    
  } catch(e) {
    appendLog('ERROR: ' + e.message, 'error');
    btn.disabled = false; btn.style.background = '#C8FF00'; btn.textContent = 'EXECUTE_FORGE — 25 GNS';
  }
});

var player = document.getElementById('audio-player');
document.getElementById('play-btn').addEventListener('click', function() {
  if (!player.src) return;
  if (player.paused) {
    player.play();
    this.querySelector('span').textContent = 'pause';
  } else {
    player.pause();
    this.querySelector('span').textContent = 'play_arrow';
  }
});

player.addEventListener('timeupdate', function() {
  var p = (player.currentTime / player.duration) * 100 || 0;
  document.getElementById('progress-bar').style.width = p + '%';
  var fmt = function(s) { return Math.floor(s/60).toString().padStart(2,'0') + ':' + Math.floor(s%60).toString().padStart(2,'0'); };
  document.getElementById('player-meta').textContent = fmt(player.currentTime) + ' / ' + (isNaN(player.duration)?'--:--':fmt(player.duration)) + ' // 44.1KHZ';
});
</script>
</body>
</html>
