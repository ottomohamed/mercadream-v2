<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MercaDream - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #060606; color: #e5e2e1; font-family: monospace; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 50px auto; background: #111; border: 1px solid #c8ff00; padding: 30px; border-radius: 8px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; }
        button { background: #c8ff00; color: black; font-weight: bold; cursor: pointer; border: none; }
        .error { color: #ff4444; }
        .success { color: #00ff88; }
        .info-box { background: #1a1a1a; padding: 20px; margin-top: 20px; border-left: 3px solid #c8ff00; }
        .logout-btn { background: transparent; border: 1px solid #ff4444; color: #ff4444; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="color:#c8ff00; text-align:center;">MERCADREAM</h1>
    <div id="loginForm">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">LOGIN</button>
        <div id="message" class="error"></div>
    </div>
    <div id="profileInfo" style="display:none;">
        <div class="info-box">
            <p> LOGGED IN</p>
            <p>Email: <span id="userEmail"></span></p>
        </div>
        <button onclick="logout()" class="logout-btn">LOGOUT</button>
        <button onclick="location.href='studio.html'">GO TO STUDIO</button>
    </div>
</div>
<script>
const SUPABASE_URL = 'https://xvkxogrmewnzwhtghuiz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2a3hvZ3JtZXduendodGdodWl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzU3ODAsImV4cCI6MjA5Mzg1MTc4MH0.b9KW4aJyC4Ahs_Yui-Rn3HeJ8dwIEZdP_kDDSpp4jIk';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function checkLogin() {
    if (localStorage.getItem('sb_session') === 'true') {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('profileInfo').style.display = 'block';
        document.getElementById('userEmail').innerText = localStorage.getItem('md_email') || 'unknown';
    }
}

async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const msg = document.getElementById('message');
    msg.textContent = 'Logging in...';
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { msg.textContent = error.message; return; }
    localStorage.setItem('sb_session', 'true');
    localStorage.setItem('md_email', data.user.email);
    localStorage.setItem('md_user_id', data.user.id);
    msg.textContent = 'Success!';
    checkLogin();
}

function logout() { localStorage.clear(); location.reload(); }
checkLogin();
</script>
</body>
</html>
