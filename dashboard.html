<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MercaDream - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: #060606;
            color: #e5e2e1;
            font-family: monospace;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: #111;
            border: 1px solid #c8ff00;
            border-radius: 8px;
            padding: 30px;
        }
        h1 { color: #c8ff00; text-align: center; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
        }
        button {
            background: #c8ff00;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        button:hover { background: #a8d700; }
        .error { color: #ff4444; margin-top: 10px; }
        .success { color: #00ff88; }
        .info-box {
            background: #1a1a1a;
            padding: 20px;
            margin-top: 20px;
            border-radius: 4px;
            border-left: 3px solid #c8ff00;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        .logout-btn:hover { background: #ff4444; color: black; }
        hr { border-color: #333; }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1> MERCADREAM</h1>
    
    <!-- حالة تسجيل الدخول -->
    <div id="loggedInView" style="display: none;">
        <div class="info-box">
            <h3> مرحباً بك في السوق</h3>
            <p><strong>البريد الإلكتروني:</strong> <span id="userEmail">-</span></p>
            <p><strong>المستخدم ID:</strong> <span id="userId">-</span></p>
            <p><strong>حالة الجلسة:</strong> <span class="success">نشطة </span></p>
        </div>
        <button onclick="logout()" class="logout-btn"> تسجيل الخروج</button>
        <button onclick="location.href='pricing.html'"> شحن الرصيد</button>
        <button onclick="location.href='studio.html'"> الذهاب إلى الاستوديو</button>
    </div>
    
    <!-- نموذج تسجيل الدخول -->
    <div id="loginView">
        <h3> تسجيل الدخول</h3>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">دخول </button>
        <div id="message" class="error"></div>
        <hr>
        <p style="text-align:center; font-size:12px; color:#666;">ليس لديك حساب؟ <a href="register.html" style="color:#c8ff00;">إنشاء حساب</a></p>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://xvkxogrmewnzwhtghuiz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2a3hvZ3JtZXduendodGdodWl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzU3ODAsImV4cCI6MjA5Mzg1MTc4MH0.b9KW4aJyC4Ahs_Yui-Rn3HeJ8dwIEZdP_kDDSpp4jIk';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function checkSession() {
    const session = localStorage.getItem('sb_session');
    const email = localStorage.getItem('md_email');
    
    if (session === 'true' || session === '1') {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('loggedInView').style.display = 'block';
        document.getElementById('userEmail').innerText = email || 'unknown';
        document.getElementById('userId').innerText = localStorage.getItem('md_user_id') || '-';
    } else {
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('loggedInView').style.display = 'none';
    }
}

async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const msgDiv = document.getElementById('message');
    
    if (!email || !password) {
        msgDiv.textContent = ' الرجاء إدخال البريد الإلكتروني وكلمة المرور';
        return;
    }
    
    msgDiv.textContent = ' جاري تسجيل الدخول...';
    msgDiv.style.color = '#c8ff00';
    
    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
    });
    
    if (error) {
        msgDiv.textContent = ' ' + error.message;
        msgDiv.style.color = '#ff4444';
        return;
    }
    
    if (data && data.user) {
        // حفظ البيانات
        localStorage.setItem('sb_session', 'true');
        localStorage.setItem('md_email', data.user.email);
        localStorage.setItem('md_user', JSON.stringify(data.user));
        localStorage.setItem('md_user_id', data.user.id);
        localStorage.setItem('md_credits', '100');
        localStorage.setItem('md_plan', 'free');
        
        console.log(' Session saved successfully');
        console.log('sb_session:', localStorage.getItem('sb_session'));
        
        msgDiv.textContent = ' تم تسجيل الدخول بنجاح!';
        msgDiv.style.color = '#00ff88';
        
        // تحديث الواجهة
        checkSession();
        
        // اختياري: إخفاء الرسالة بعد 2 ثانية
        setTimeout(() => {
            msgDiv.textContent = '';
        }, 2000);
    }
}

function logout() {
    localStorage.clear();
    checkSession();
    location.reload();
}

// فحص الجلسة عند تحميل الصفحة
checkSession();

// التحقق كل ثانية (للتأكد من عدم مسح الجلسة)
setInterval(checkSession, 1000);
</script>
</body>
</html>
