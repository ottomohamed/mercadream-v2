<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MercaDream - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #060606; color: #e5e2e1; font-family: monospace; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 50px auto; background: #111; border: 1px solid #c8ff00; padding: 30px; border-radius: 8px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 4px; }
        button { background: #c8ff00; color: black; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #a8d700; }
        .error { color: #ff4444; margin-top: 10px; }
        .success { color: #00ff88; }
        .info-box { background: #1a1a1a; padding: 20px; margin-top: 20px; border-left: 3px solid #c8ff00; }
        .logout-btn { background: transparent; border: 1px solid #ff4444; color: #ff4444; }
        .logout-btn:hover { background: #ff4444; color: black; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="color:#c8ff00; text-align:center;"> MERCADREAM</h1>
    
    <div id="loginForm">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn">LOGIN</button>
        <div id="message" class="error"></div>
    </div>
    
    <div id="profileInfo" style="display:none;">
        <div class="info-box">
            <p> LOGGED IN</p>
            <p><strong>Email:</strong> <span id="userEmail"></span></p>
            <p><strong>Session:</strong> <span class="success">Active</span></p>
        </div>
        <button id="logoutBtn" class="logout-btn"> LOGOUT</button>
        <button onclick="window.location.href='studio.html'"> GO TO STUDIO</button>
    </div>
</div>

<script>
// تعريف supabase مرة واحدة فقط
const SUPABASE_URL = 'https://xvkxogrmewnzwhtghuiz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2a3hvZ3JtZXduendodGdodWl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzU3ODAsImV4cCI6MjA5Mzg1MTc4MH0.b9KW4aJyC4Ahs_Yui-Rn3HeJ8dwIEZdP_kDDSpp4jIk';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

console.log('Supabase initialized');

// التحقق من الجلسة الحالية
function checkLogin() {
    const session = localStorage.getItem('sb_session');
    const email = localStorage.getItem('md_email');
    console.log('Checking login - session:', session, 'email:', email);
    
    if (session === 'true') {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('profileInfo').style.display = 'block';
        document.getElementById('userEmail').innerText = email || 'unknown';
    } else {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('profileInfo').style.display = 'none';
    }
}

// دالة تسجيل الدخول
async function performLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const msgDiv = document.getElementById('message');
    
    if (!email || !password) {
        msgDiv.textContent = 'Please enter email and password';
        return;
    }
    
    msgDiv.textContent = 'Logging in...';
    msgDiv.style.color = '#c8ff00';
    
    console.log('Attempting login for:', email);
    
    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
    });
    
    if (error) {
        console.error('Login error:', error);
        msgDiv.textContent = error.message;
        msgDiv.style.color = '#ff4444';
        return;
    }
    
    if (data && data.user) {
        console.log('Login successful for:', data.user.email);
        
        // حفظ البيانات
        localStorage.setItem('sb_session', 'true');
        localStorage.setItem('md_email', data.user.email);
        localStorage.setItem('md_user_id', data.user.id);
        
        console.log('Saved to localStorage - sb_session:', localStorage.getItem('sb_session'));
        console.log('Saved to localStorage - md_email:', localStorage.getItem('md_email'));
        
        msgDiv.textContent = ' Login successful!';
        msgDiv.style.color = '#00ff88';
        
        // تحديث الواجهة
        checkLogin();
        
        // إخفاء الرسالة بعد 2 ثانية
        setTimeout(() => {
            msgDiv.textContent = '';
        }, 2000);
    }
}

// دالة تسجيل الخروج
function performLogout() {
    console.log('Logging out...');
    localStorage.clear();
    checkLogin();
}

// ربط الأزرار
document.getElementById('loginBtn').onclick = performLogin;
document.getElementById('logoutBtn').onclick = performLogout;

// التحقق من الجلسة عند التحميل
checkLogin();

// التحقق كل ثانية (للمراقبة فقط)
setInterval(checkLogin, 1000);
</script>
</body>
</html>
