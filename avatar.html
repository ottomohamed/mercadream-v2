// Balance
document.getElementById('gns-balance').textContent = credits.toLocaleString() + ' GNS';

// Firebase sync

  firebase.auth().onAuthStateChanged(function(user) {
    if (!user) return;
    localStorage.setItem('md_user_id', user.uid);
    firebase.firestore().collection('users').doc(user.uid).onSnapshot(function(doc) {
      if (!doc.exists) return;
      credits = doc.data().credits || 0;
      localStorage.setItem('md_credits', credits);
      document.getElementById('gns-balance').textContent = credits.toLocaleString() + ' GNS';
    });
  });

var currentCat = 'all';

function buildGrid(cat) {
  var grid = document.getElementById('char-grid');
  grid.innerHTML = '';
  CHARACTERS.filter(function(c) { return cat === 'all' || c.cat === cat; }).forEach(function(c) {
    var div = document.createElement('div');
    div.className = 'char-card border border-[#333] p-1 cursor-pointer transition-all hover:border-[#c8ff00]';
    div.style.background = '#000';
    div.innerHTML = '<img src="'+c.img+'" class="w-full aspect-square object-cover mb-1" onerror="this.src='https://images.pexels.com/photos/2381069/pexels-photo-2381069.jpeg?auto=compress&cs=tinysrgb&w=400'"/>'
      + '<div class="text-[8px] text-[#e0e0e0] truncate">'+c.name+'</div>'
      + '<div class="text-[7px] text-[#666] border border-[#333] px-1 inline-block mt-0.5">'+c.cat+'</div>';
    div.addEventListener('click', function() {
      document.querySelectorAll('.char-card').forEach(function(el) {
        el.style.borderColor = '#333';
        el.style.boxShadow = '';
      });
      div.style.borderColor = '#c8ff00';
      div.style.boxShadow = '0 0 8px rgba(200,255,0,0.4)';
      selectedCharImg = c.img;
      selectedCharName = c.name;
      addLog('CHARACTER: '+c.name+' SELECTED');
    });
    grid.appendChild(div);
  });
}
buildGrid('all');

function addLog(msg) {

// ── Generate ──
document.getElementById('generate-btn').addEventListener('click', async function() {
  var script = document.getElementById('script-input').value.trim();
  if (!script) { addLog('ERROR: SCRIPT IS EMPTY'); return; }
  if (!selectedCharImg) { addLog('ERROR: SELECT A CHARACTER FIRST'); return; }

  var cost = parseInt(document.getElementById('selected-cost').value);
  var totalCost = cost + 10;
  if (credits < totalCost) { addLog('ERROR: INSUFFICIENT GNS (need '+totalCost+')'); return; }

  var btn = document.getElementById('generate-btn');
  btn.disabled = true; btn.textContent = 'GENERATING...';
  document.getElementById('render-progress').classList.remove('hidden');
  document.getElementById('video-result').classList.add('hidden');

  addLog('SCRIPT: '+script.length+' CHARS');
  addLog('GENERATING VOICE...');

  try {
    // Step 1: Generate voice
    var engine = document.getElementById('selected-engine').value;
    var voiceId = document.getElementById('voice-select').value;
    var lang = document.getElementById('lang-select').value;

    var ttsEndpoint = engine === 'elevenlabs' ? '/api/elevenlabs' : '/api/tts';
    var ttsBody = engine === 'elevenlabs'
      ? { text: script, voice_id: voiceId, language: lang }
      : { text: script, voice: voiceId, language: lang };

    var ttsRes = await fetch(ttsEndpoint, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(ttsBody)
    });
    var ttsData = await ttsRes.json();
    if (!ttsData.taskId) throw new Error(ttsData.error || 'TTS failed');
    addLog('TTS JOB: '+ttsData.taskId);
    document.getElementById('progress-bar').style.width = '20%';

    // Poll TTS
    var audioUrl = null;
    for (var i = 0; i < 60; i++) {
      await new Promise(r => setTimeout(r, 3000));
      var tp = await fetch('/api/video?id='+ttsData.taskId);
      var td = await tp.json();
      addLog('TTS POLL '+i+': '+(td.status||'').toUpperCase());
      if (td.status === 'completed' && td.videoUrl) { audioUrl = td.videoUrl; break; }
      if (td.status === 'failed') throw new Error('TTS failed');
    }
    if (!audioUrl) throw new Error('TTS timeout');
    addLog('VOICE READY');
    document.getElementById('progress-bar').style.width = '40%';

    // Deduct credits locally + Firebase
    credits -= totalCost;
    localStorage.setItem('md_credits', credits);
    document.getElementById('gns-balance').textContent = credits.toLocaleString() + ' GNS';
    try {
      var uid = localStorage.getItem('md_user_id');
      if (uid) firebase.firestore().collection('users').doc(uid).update({ credits: credits });
    } catch(fe) {}

    // Step 2: Generate avatar (LongCat 1.5)
    addLog('INITIATING LONGCAT AVATAR...');
    var dur = parseInt(document.getElementById('selected-dur').value);
    var res = document.getElementById('selected-res').value;

    var avRes = await fetch('/api/avatar', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        image: selectedCharImg,
        audio: audioUrl,
        duration: dur,
        resolution: res,
        model: 'longcat'
      })
    });
    var avData = await avRes.json();
    if (!avData.taskId) throw new Error(avData.error || 'Avatar failed');
    addLog('AVATAR JOB: '+avData.taskId);
    document.getElementById('progress-bar').style.width = '60%';

    // Poll Avatar
    var attempts = 0;
    var poll = setInterval(async function() {
      attempts++;
      if (attempts > 120) {
        clearInterval(poll);
        credits += totalCost;
        localStorage.setItem('md_credits', credits);
        document.getElementById('gns-balance').textContent = credits.toLocaleString() + ' GNS';
        try { var uid2=localStorage.getItem('md_user_id'); if(uid2) firebase.firestore().collection('users').doc(uid2).update({credits:credits}); } catch(fe){}
        addLog('TIMEOUT — credits refunded');
        btn.disabled = false; btn.textContent = 'GENERATE AVATAR VIDEO';
        return;
      }
      try {
        var pr = await fetch('/api/video?id='+avData.taskId);
        var pd = await pr.json();
        var pct = Math.min(60 + attempts, 95);
        document.getElementById('progress-bar').style.width = pct+'%';
        addLog('POLL '+attempts+': '+(pd.status||'').toUpperCase());
        if (pd.status === 'completed' && pd.videoUrl) {
          clearInterval(poll);
          currentVideoUrl = pd.videoUrl;
          document.getElementById('progress-bar').style.width = '100%';
          document.getElementById('result-video').src = pd.videoUrl;
          document.getElementById('video-result').classList.remove('hidden');
          addLog('AVATAR READY!');
          btn.disabled = false; btn.textContent = 'GENERATE AVATAR VIDEO';
          // Save to Firebase
          try {
            var uid = localStorage.getItem('md_user_id');
            if (uid) {
              firebase.firestore().collection('users').doc(uid).collection('videos').add({
                videoUrl: pd.videoUrl, type: 'avatar', character: selectedCharName,
                createdAt: new Date().toISOString()
              });
              firebase.firestore().collection('users').doc(uid).update({
                renders: firebase.firestore.FieldValue.increment(1)
              });
            }
          } catch(fe) {}
        } else if (pd.status === 'failed') {
          clearInterval(poll);
          throw new Error('Avatar generation failed');
        }
      } catch(pe) { addLog('POLL ERR: '+pe.message); }
    }, 5000);

  } catch(e) {
    addLog('ERROR: '+e.message);
    credits += totalCost;
    localStorage.setItem('md_credits', credits);
    document.getElementById('gns-balance').textContent = credits.toLocaleString() + ' GNS';
    try { var uid3=localStorage.getItem('md_user_id'); if(uid3) firebase.firestore().collection('users').doc(uid3).update({credits:credits}); } catch(fe){}
    btn.disabled = false; btn.textContent = 'GENERATE AVATAR VIDEO';
  }
});

// Download
document.getElementById('dl-btn').addEventListener('click', function() {
  if (!currentVideoUrl) return;
  var a = document.createElement('a');
  a.href = currentVideoUrl;
  a.download = 'mercadream_avatar_'+Date.now()+'.mp4';
  a.click();
});

// Assembly
document.getElementById('asm-btn').addEventListener('click', function() {
  if (!currentVideoUrl) return;
  localStorage.setItem('NEURA_ACTIVE_STREAM', JSON.stringify({
    url: currentVideoUrl, name: 'avatar_'+Date.now()+'.mp4', type: 'video', duration: 10
  }));
  window.location.href = 'assembly.html';
});
</script>
