<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MERCADREAM | ASSEMBLY</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060606;color:#e5e2e1;font-family:'IBM Plex Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{height:48px;background:#0d0d0d;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.logo{color:#c8ff00;font-size:13px;font-weight:700;letter-spacing:2px}
.credits{color:#c8ff00;font-size:11px}
.btn{background:transparent;border:1px solid #434933;color:#888;padding:4px 12px;font-family:inherit;font-size:9px;cursor:pointer;letter-spacing:1px}
.btn:hover{border-color:#c8ff00;color:#c8ff00}
.btn-green{background:#c8ff00;color:#000;border:none;padding:6px 16px;font-family:inherit;font-size:9px;font-weight:700;cursor:pointer;letter-spacing:2px}
.btn-green:hover{background:#aad900}
main{flex:1;display:grid;grid-template-columns:280px 1fr 260px;overflow:hidden}

/* LEFT - Scenes */
#scenes-panel{border-right:1px solid #222;display:flex;flex-direction:column;overflow:hidden}
.scenes-header{padding:10px 14px;border-bottom:1px solid #222;font-size:9px;color:#434933;letter-spacing:2px;display:flex;justify-content:space-between;align-items:center}
#scenes-list{flex:1;overflow-y:auto;padding:8px}
#scenes-list::-webkit-scrollbar{width:3px}
#scenes-list::-webkit-scrollbar-thumb{background:#434933}

.scene-row{margin-bottom:12px;border:1px solid #222;padding:8px}
.scene-label{font-size:8px;color:#ffba3f;letter-spacing:2px;margin-bottom:6px}
.scene-options{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.opt-thumb{aspect-ratio:16/9;background:#111;cursor:pointer;position:relative;overflow:hidden;border:1px solid #222}
.opt-thumb img{width:100%;height:100%;object-fit:cover;opacity:.6;transition:opacity .2s}
.opt-thumb:hover img{opacity:1}
.opt-thumb.selected{border-color:#ffba3f}
.opt-thumb.selected img{opacity:1}
.opt-thumb .dur{position:absolute;bottom:2px;right:3px;font-size:7px;color:#fff;background:rgba(0,0,0,.8);padding:1px 3px}
.opt-thumb .sel-badge{position:absolute;top:2px;right:2px;background:#ffba3f;color:#000;font-size:6px;font-weight:700;padding:1px 4px;display:none}
.opt-thumb.selected .sel-badge{display:block}
.no-options{font-size:8px;color:#333;text-align:center;padding:8px}
.fetch-btn{width:100%;padding:4px;background:rgba(200,255,0,.1);border:1px solid #c8ff00;color:#c8ff00;font-family:inherit;font-size:8px;cursor:pointer;margin-top:4px}
.fetch-btn:hover{background:rgba(200,255,0,.2)}

/* CENTER - Preview */
#preview-panel{display:flex;flex-direction:column;background:#000}
#preview-container{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:#050505}
#preview-video{width:100%;height:100%;object-fit:contain;display:none}
#preview-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;color:#222;font-size:11px;letter-spacing:3px}
#preview-title{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.8);color:#c8ff00;font-size:9px;padding:3px 8px;letter-spacing:1px}
.preview-controls{height:44px;border-top:1px solid #222;display:flex;align-items:center;justify-content:center;gap:12px;background:#0d0d0d}
.ctrl-btn{background:transparent;border:1px solid #333;color:#888;width:32px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.ctrl-btn:hover{border-color:#c8ff00;color:#c8ff00}

/* RIGHT - Timeline */
#timeline-panel{border-left:1px solid #222;display:flex;flex-direction:column;overflow:hidden}
.timeline-header{padding:10px 14px;border-bottom:1px solid #222;font-size:9px;color:#434933;letter-spacing:2px}
#timeline-list{flex:1;overflow-y:auto;padding:8px}
#timeline-list::-webkit-scrollbar{width:3px}
#timeline-list::-webkit-scrollbar-thumb{background:#434933}
.tl-slot{height:54px;border:1px solid #222;margin-bottom:6px;position:relative;overflow:hidden;cursor:pointer;display:flex;align-items:center}
.tl-slot img{width:100%;height:100%;object-fit:cover;opacity:.5}
.tl-slot .tl-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.85);padding:2px 6px;font-size:7px;color:#ffba3f}
.tl-slot.empty{background:#0a0a0a;justify-content:center;color:#222;font-size:8px}
.tl-slot.active{border-color:#c8ff00}
.export-bar{padding:10px;border-top:1px solid #222;display:flex;flex-direction:column;gap:6px}
.status-bar{font-size:8px;color:#434933;letter-spacing:1px;text-align:center}
</style>
</head>
<body>

<header>
  <div class="logo">MERCADREAM | ASSEMBLY</div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="credits" id="hdr-credits">— CR</span>
    <button class="btn" onclick="fetchAllScenes()">⚡ FETCH ALL</button>
    <button class="btn" onclick="loadScenes();renderScenes();renderTimeline();updateCount();">↻ RELOAD</button>
    <button class="btn" onclick="window.location.href='studio.html'">← STUDIO</button>
  </div>
</header>

<main>
  <!-- LEFT -->
  <div id="scenes-panel">
    <div class="scenes-header">
      <span>SCENES × OPTIONS</span>
      <span id="selected-count" style="color:#c8ff00">0/0</span>
    </div>
    <div id="scenes-list"><div style="padding:20px;text-align:center;color:#333;font-size:9px">Loading scenes...</div></div>
  </div>

  <!-- CENTER -->
  <div id="preview-panel">
    <div id="preview-container">
      <div id="preview-placeholder">NO CLIP SELECTED</div>
      <video id="preview-video" controls loop muted></video>
      <div id="preview-title" style="display:none"></div>
    </div>
    <div class="preview-controls">
      <button class="ctrl-btn" onclick="prevClip()">⏮</button>
      <button class="ctrl-btn" id="play-btn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="nextClip()">⏭</button>
      <button class="ctrl-btn" onclick="toggleMute()" title="Mute">🔇</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="timeline-panel">
    <div class="timeline-header">MASTER TIMELINE</div>
    <div id="timeline-list"></div>
    <div class="export-bar">
      <div class="status-bar" id="status-bar">SELECT CLIPS TO BUILD FILM</div>
      <button class="btn-green" onclick="buildFilm()" style="width:100%;padding:10px;font-size:10px">⚡ BUILD FILM</button>
    </div>
  </div>
</main>

<script>
var _scenes = [];
var _selected = {}; // sceneIdx → vid object
var _currentIdx = -1;

// ── Init ──
window.addEventListener('load', function(){
  loadCredits();
  loadScenes();
});

function loadCredits(){
  var c = parseInt(localStorage.getItem('md_credits')||'0');
  document.getElementById('hdr-credits').textContent = c.toLocaleString() + ' CR';
}

function loadScenes(){
  var av = JSON.parse(localStorage.getItem('md_assembly_videos')||'[]');
  var ss = JSON.parse(localStorage.getItem('md_6scenes')||'[]');
  _scenes = av.length ? av : ss;
  console.log('[Assembly] md_assembly_videos:', av.length, 'md_6scenes:', ss.length, 'total scenes:', _scenes.length);

  if(!_scenes.length){
    document.getElementById('scenes-list').innerHTML =
      '<div style="padding:24px;text-align:center;color:#333;font-size:9px">NO SCENES FOUND<br><br>' +
      '<button onclick="window.location.href=\'studio.html\'" style="background:#c8ff00;color:#000;border:none;padding:6px 14px;font-family:inherit;font-size:9px;font-weight:700;cursor:pointer">→ GO TO STUDIO</button></div>';
    return;
  }

  // Pre-select first option if available
  _scenes.forEach(function(s,i){
    var opts = s.options||(s.url?[{id:i,url:s.url,thumb:s.thumb,duration:s.duration||10}]:[]);
    if(opts.length) _selected[i] = opts[0];
  });

  renderScenes();
  renderTimeline();
  updateCount();
}

function renderScenes(){
  var list = document.getElementById('scenes-list');
  list.innerHTML = '';
  _scenes.forEach(function(scene, i){
    var opts = scene.options||(scene.url?[{id:i,url:scene.url,thumb:scene.thumb,duration:scene.duration||10}]:[]);
    var title = (scene.title||'Scene '+(i+1)).replace(/Scene \d+\/\d+: /,'').substring(0,22);
    var sel = _selected[i];

    var row = document.createElement('div');
    row.className = 'scene-row';
    row.id = 'scene-row-'+i;

    var html = '<div class="scene-label">S0'+(i+1)+' — '+title+'</div>';

    if(opts.length){
      html += '<div class="scene-options">';
      opts.forEach(function(v,j){
        var isSel = sel && sel.id===v.id;
        html += '<div class="opt-thumb'+(isSel?' selected':'')+'" onclick="selectOpt('+i+','+j+')">' +
          (v.thumb ? '<img src="'+v.thumb+'">' : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#333;font-size:7px">NO IMG</div>') +
          '<div class="dur">'+(v.duration||10)+'s</div>' +
          '<div class="sel-badge">✓</div>' +
        '</div>';
      });
      html += '</div>';
      html += '<button class="fetch-btn" onclick="fetchScene('+i+')">↻ NEW OPTIONS</button>';
    } else {
      html += '<div class="no-options">No options yet</div>';
      html += '<button class="fetch-btn" onclick="fetchScene('+i+')">FETCH 3 CLIPS</button>';
    }

    row.innerHTML = html;
    list.appendChild(row);
  });
}

function selectOpt(si, vi){
  var scene = _scenes[si];
  var opts = scene.options||(scene.url?[{id:si,url:scene.url,thumb:scene.thumb,duration:scene.duration||10}]:[]);
  var vid = opts[vi];
  if(!vid) return;
  _selected[si] = vid;

  // Play in preview
  playVideo(vid, 'S0'+(si+1));

  // Re-render scene row
  var row = document.getElementById('scene-row-'+si);
  if(row){
    var newRow = document.createElement('div');
    newRow.className = 'scene-row';
    newRow.id = 'scene-row-'+si;
    row.parentNode.replaceChild(newRow, row);
    _scenes[si]._tmpOpts = opts;
    renderSingleRow(si, newRow);
  }

  renderTimeline();
  updateCount();
  saveProgress();
}

function renderSingleRow(i, row){
  var scene = _scenes[i];
  var opts = scene.options||(scene.url?[{id:i,url:scene.url,thumb:scene.thumb,duration:scene.duration||10}]:[]);
  var sel = _selected[i];
  var title = (scene.title||'Scene '+(i+1)).replace(/Scene \d+\/\d+: /,'').substring(0,22);

  var html = '<div class="scene-label">S0'+(i+1)+' — '+title+'</div>';
  html += '<div class="scene-options">';
  opts.forEach(function(v,j){
    var isSel = sel && sel.id===v.id;
    html += '<div class="opt-thumb'+(isSel?' selected':'')+'" onclick="selectOpt('+i+','+j+')">' +
      (v.thumb ? '<img src="'+v.thumb+'">' : '') +
      '<div class="dur">'+(v.duration||10)+'s</div>' +
      '<div class="sel-badge">✓</div>' +
    '</div>';
  });
  html += '</div>';
  html += '<button class="fetch-btn" onclick="fetchScene('+i+')">↻ NEW OPTIONS</button>';
  row.innerHTML = html;
}

function renderTimeline(){
  var list = document.getElementById('timeline-list');
  list.innerHTML = '';
  _scenes.forEach(function(scene, i){
    var sel = _selected[i];
    var slot = document.createElement('div');
    slot.className = 'tl-slot' + (sel ? '' : ' empty') + (_currentIdx===i?' active':'');
    slot.onclick = function(){ if(sel) playVideo(sel,'S0'+(i+1)); };

    if(sel && sel.thumb){
      slot.innerHTML = '<img src="'+sel.thumb+'"><div class="tl-label">S0'+(i+1)+' — '+(sel.duration||10)+'s</div>';
    } else {
      slot.innerHTML = 'S0'+(i+1)+' — EMPTY';
    }
    list.appendChild(slot);
  });
}

function playVideo(vid, title){
  var video = document.getElementById('preview-video');
  var placeholder = document.getElementById('preview-placeholder');
  var titleEl = document.getElementById('preview-title');

  if(vid.url){
    video.src = vid.url;
    video.style.display = 'block';
    video.play().catch(function(){});
    placeholder.style.display = 'none';
    titleEl.style.display = 'block';
    titleEl.textContent = title + ' — ' + (vid.duration||10) + 's';
  } else {
    placeholder.style.display = 'flex';
    video.style.display = 'none';
    titleEl.style.display = 'none';
  }
}

function togglePlay(){
  var v = document.getElementById('preview-video');
  var btn = document.getElementById('play-btn');
  if(v.paused){ v.play(); btn.textContent='⏸'; }
  else { v.pause(); btn.textContent='▶'; }
}

function toggleMute(){
  var v = document.getElementById('preview-video');
  v.muted = !v.muted;
}

function prevClip(){
  var keys = Object.keys(_selected).map(Number).sort();
  if(!keys.length) return;
  var cur = keys.indexOf(_currentIdx);
  var prev = keys[cur>0?cur-1:keys.length-1];
  _currentIdx = prev;
  playVideo(_selected[prev], 'S0'+(prev+1));
}

function nextClip(){
  var keys = Object.keys(_selected).map(Number).sort();
  if(!keys.length) return;
  var cur = keys.indexOf(_currentIdx);
  var next = keys[cur<keys.length-1?cur+1:0];
  _currentIdx = next;
  playVideo(_selected[next], 'S0'+(next+1));
}

function updateCount(){
  var sel = Object.keys(_selected).length;
  document.getElementById('selected-count').textContent = sel+'/'+_scenes.length;
  document.getElementById('status-bar').textContent =
    sel === _scenes.length ? 'ALL CLIPS SELECTED — READY TO BUILD' :
    sel + '/' + _scenes.length + ' CLIPS SELECTED';
}

async function fetchScene(si){
  var scene = _scenes[si];
  if(!scene) return;
  var btn = document.querySelector('#scene-row-'+si+' .fetch-btn');
  if(btn){ btn.textContent='LOADING...'; btn.disabled=true; }

  var kw = (scene.keywords||scene.title||'cinematic').replace(/Scene \d+\/\d+: /,'').substring(0,60);
  try{
    var r = await fetch('/api/pexels?q='+encodeURIComponent(kw)+'&per_page=3');
    var d = await r.json();
    _scenes[si].options = (d.videos||[]).map(function(v){
      return {id:v.id,url:v.url,thumb:v.thumb,duration:v.duration};
    });
    if(_scenes[si].options[0] && !_selected[si]){
      _selected[si] = _scenes[si].options[0];
    }
    // Update localStorage
    var av = JSON.parse(localStorage.getItem('md_assembly_videos')||'[]');
    if(av[si]){ av[si].options=_scenes[si].options; localStorage.setItem('md_assembly_videos',JSON.stringify(av)); }
    renderScenes();
    renderTimeline();
    updateCount();
  }catch(e){
    if(btn){ btn.textContent='RETRY'; btn.disabled=false; }
  }
}

async function fetchAllScenes(){
  for(var i=0;i<_scenes.length;i++){
    var s=_scenes[i];
    if(!s.options||!s.options.length) await fetchScene(i);
  }
}

function saveProgress(){
  localStorage.setItem('md_asm_v4',JSON.stringify({selected:_selected}));
}

function buildFilm(){
  var keys = Object.keys(_selected);
  if(!keys.length){ alert('Select at least one clip.'); return; }
  var film = {
    scenes: keys.sort(function(a,b){return a-b;}).map(function(i){
      var v=_selected[i];
      return {scene:parseInt(i)+1,url:v.url,thumb:v.thumb,duration:v.duration||10};
    }),
    created: new Date().toISOString()
  };
  localStorage.setItem('md_final_film',JSON.stringify(film));
  var m = document.createElement('div');
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center';
  m.innerHTML='<div style="font-size:22px;color:#c8ff00;letter-spacing:4px;margin-bottom:8px">⚡ FILM READY</div>'+
    '<div style="font-size:10px;color:#666;margin-bottom:24px">'+film.scenes.length+' SCENES × 10s = '+film.scenes.length*10+'s</div>'+
    '<div style="display:flex;gap:12px">'+
      '<button onclick="var b=new Blob([localStorage.getItem(\'md_final_film\')],{type:\'application/json\'});var u=URL.createObjectURL(b);var a=document.createElement(\'a\');a.href=u;a.download=\'film.json\';a.click()" style="padding:10px 24px;background:#c8ff00;border:none;font-family:inherit;font-size:9px;font-weight:700;cursor:pointer;color:#000">⬇ DOWNLOAD</button>'+
      '<button onclick="this.closest(\'div\').remove()" style="padding:10px 24px;background:transparent;border:1px solid #434933;font-family:inherit;font-size:9px;cursor:pointer;color:#888">CLOSE</button>'+
    '</div>';
  document.body.appendChild(m);
}
</script>
</body>
</html>
