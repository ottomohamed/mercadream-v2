<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MercaDream - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjVzVwEa5tTOjsYtsCB2h3kcqUhyxYOTg",
            authDomain: "mercadream-4b4b3.firebaseapp.com",
            projectId: "mercadream-4b4b3",
            storageBucket: "mercadream-4b4b3.firebasestorage.app",
            messagingSenderId: "257560928442",
            appId: "1:257560928442:web:06983f27629a13eeed6283",
            measurementId: "G-F0CLDJCV42"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.logout = async function() {
            await signOut(auth);
            localStorage.clear();
            window.location.href = 'login.html';
        };

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0];
                localStorage.setItem('md_email', user.email);
                localStorage.setItem('sb_session', 'true');
            }
        });
    </script>
    <style>
        body{background:#060606;color:#e2e4d1;font-family:'IBM Plex Mono',monospace;padding:40px}
        .container{max-width:500px;margin:auto;background:#0a0a0a;border:1px solid #a8d700;padding:32px;border-radius:8px}
        button{padding:12px 24px;background:#a8d700;border:none;color:#060606;font-weight:700;cursor:pointer;margin:10px 0;border-radius:4px}
        .logout-btn{background:transparent;border:1px solid #ff4444;color:#ff4444}
    </style>
</head>
<body>
<div class="container">
    <h1 style="color:#a8d700;">MERCADREAM</h1>
    <div style="margin:20px 0">
        <p><strong>Name:</strong> <span id="userName">Loading...</span></p>
        <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
    </div>
    <button onclick="location.href='studio.html'">Go to Studio</button>
    <button onclick="logout()" class="logout-btn">Sign Out</button>
</div>
</body>
</html>
