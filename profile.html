<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MERCADREAM  PROFILE</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        body { background-color: #060606; color: #e5e2e1; font-family: 'Inter', sans-serif; }
        .scanline-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            pointer-events: none; z-index: 50;
        }
        .surgical-border { border: 1px solid #222222; }
        .neon-glow:hover { box-shadow: 0 0 12px #c8f500; border-color: #c8f500; }
    </style>
</head>
<body class="bg-background text-on-background overflow-x-hidden">
<div class="scanline-overlay"></div>
<div class="flex h-screen overflow-hidden">

<!-- Sidebar -->
<aside class="hidden md:flex flex-col h-full border-r border-outline-variant bg-surface w-64 z-20">
    <div class="p-6">
        <div class="flex items-center gap-2 mb-8">
            <div class="w-2 h-2 bg-primary-fixed animate-pulse"></div>
            <span class="font-display-lg text-headline-lg tracking-tighter text-primary-fixed">MERCADREAM</span>
        </div>
        <div class="mb-8 p-4 bg-surface-container-low border border-outline-variant">
            <div class="flex items-center gap-3 mb-2">
                <img id="sidebar-avatar" class="w-8 h-8 rounded-full border border-primary-fixed" src="https://www.gravatar.com/avatar/000?d=mp"/>
                <div>
                    <p class="font-technical-sm text-label-xs text-primary-fixed" id="sidebar-tier">LOADING...</p>
                    <p class="font-technical-sm text-label-xs text-on-surface-variant" id="sidebar-sub">Studio Tier</p>
                </div>
            </div>
        </div>
        <nav class="space-y-1">
            <a class="flex items-center gap-3 px-4 py-3 bg-primary-container text-on-primary-container border-l-4 border-primary-fixed" href="#">
                <span class="material-symbols-outlined text-[20px]">bolt</span>
                <span class="font-technical-sm text-technical-sm">Power Station</span>
            </a>
        </nav>
    </div>
    <div class="mt-auto p-6">
        <a class="flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:bg-surface-variant transition-colors" href="#" id="logoutBtn">
            <span class="material-symbols-outlined text-[18px]">logout</span>
            <span class="font-technical-sm text-technical-sm">Sign Out</span>
        </a>
    </div>
</aside>

<!-- Main Content -->
<main class="flex-1 overflow-y-auto bg-surface-container-lowest">
    <header class="sticky top-0 z-30 bg-background/80 backdrop-blur-md border-b border-outline-variant px-margin-desktop py-4 flex justify-between items-center max-w-container-max mx-auto w-full">
        <h1 class="font-display-lg text-headline-lg tracking-tighter text-primary-fixed">COMMAND CENTER</h1>
        <div class="flex items-center gap-4">
            <div class="hidden md:flex bg-surface-variant/30 border border-outline-variant px-3 py-1 items-center gap-2">
                <span class="material-symbols-outlined text-[16px] text-primary-fixed">account_balance_wallet</span>
                <span class="font-technical-sm text-label-xs text-on-surface" id="top-credits">0 CR</span>
            </div>
            <button class="bg-primary-fixed text-on-primary-fixed font-technical-sm text-label-xs px-4 py-1 uppercase tracking-widest hover:drop-shadow-[0_0_8px_#c8f500] transition-all" onclick="location.href='pricing.html'">Upgrade</button>
        </div>
    </header>

    <div class="max-w-container-max mx-auto px-margin-desktop py-8 space-y-gutter">
        <!-- Profile Card -->
        <section class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
            <div class="lg:col-span-5 bg-surface border border-outline-variant p-8 relative overflow-hidden group">
                <div class="flex flex-col items-center md:flex-row md:items-start gap-8 relative z-10">
                    <div class="relative group/avatar">
                        <div class="w-32 h-32 border-2 border-primary-fixed p-1">
                            <img id="profile-avatar" class="w-full h-full object-cover" src="https://www.gravatar.com/avatar/000?d=mp"/>
                        </div>
                    </div>
                    <div class="flex-1 space-y-4">
                        <div>
                            <h2 class="font-display-lg text-headline-lg text-primary-fixed" id="profile-name">LOADING...</h2>
                            <p class="font-technical-sm text-technical-sm text-on-surface-variant" id="profile-email">...</p>
                        </div>
                        <div class="inline-flex items-center gap-2 bg-primary-container/10 border border-primary-fixed/30 px-3 py-2" id="plan-box">
                            <span class="material-symbols-outlined text-primary-fixed">shield</span>
                            <div class="flex flex-col">
                                <span class="font-technical-sm text-label-xs text-primary-fixed font-bold" id="plan-title">LOADING...</span>
                                <span class="font-technical-sm text-[10px] text-on-surface-variant uppercase" id="plan-sub">...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stats -->
            <div class="lg:col-span-7 grid grid-cols-2 gap-gutter">
                <div class="bg-surface border border-outline-variant p-6">
                    <div class="flex justify-between items-start">
                        <span class="font-technical-sm text-label-xs text-on-surface-variant uppercase">Available Credits</span>
                        <span class="material-symbols-outlined text-primary-fixed">token</span>
                    </div>
                    <p class="font-display-lg text-[48px] text-primary-fixed leading-none" id="credits-val">0</p>
                </div>
                <div class="bg-surface border border-outline-variant p-6">
                    <div class="flex justify-between items-start">
                        <span class="font-technical-sm text-label-xs text-on-surface-variant uppercase">Renders</span>
                        <span class="material-symbols-outlined text-secondary">movie_creation</span>
                    </div>
                    <p class="font-display-lg text-[48px] text-on-surface leading-none" id="renders-val">0</p>
                </div>
                <div class="bg-surface border border-outline-variant p-6">
                    <div class="flex justify-between items-start">
                        <span class="font-technical-sm text-label-xs text-on-surface-variant uppercase">Recharges</span>
                        <span class="material-symbols-outlined text-tertiary-fixed-dim">history</span>
                    </div>
                    <p class="font-display-lg text-[48px] text-on-surface leading-none" id="recharges-val">0</p>
                </div>
                <div class="bg-surface border border-outline-variant p-6">
                    <div class="flex justify-between items-start">
                        <span class="font-technical-sm text-label-xs text-on-surface-variant uppercase">Assets</span>
                        <span class="material-symbols-outlined text-primary-fixed-dim">folder_shared</span>
                    </div>
                    <p class="font-display-lg text-[48px] text-on-surface leading-none" id="assets-val">0</p>
                </div>
            </div>
        </section>

        <!-- Referral Section -->
        <section class="bg-surface border border-outline-variant p-8">
            <h3 class="font-display-lg text-headline-lg text-primary-fixed mb-2">REFER &amp; EARN</h3>
            <div class="bg-surface-container-low border border-dashed border-primary-fixed p-6 mb-8 flex flex-col md:flex-row items-center justify-between gap-4">
                <span class="font-technical-sm text-headline-lg tracking-widest text-on-surface" id="ref-code">GENERATING...</span>
                <div class="flex gap-2">
                    <button id="copy-ref-btn" class="p-2 border border-outline-variant hover:border-primary-fixed transition-all">
                        <span class="material-symbols-outlined">content_copy</span>
                    </button>
                </div>
            </div>
        </section>
    </div>
</main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBjVzVwEa5tTOjsYtsCB2h3kcqUhyxYOTg",
        authDomain: "mercadream-4b4b3.firebaseapp.com",
        projectId: "mercadream-4b4b3",
        storageBucket: "mercadream-4b4b3.firebasestorage.app",
        messagingSenderId: "257560928442",
        appId: "1:257560928442:web:06983f27629a13eeed6283",
        measurementId: "G-F0CLDJCV42"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // توليد كود إحالة فريد من UID
    function generateReferralCode(uid) {
        return "MD-" + uid.substring(0, 8).toUpperCase();
    }

    // تحديث واجهة المستخدم
    function updateUI(user, userData) {
        // الاسم
        const nameEl = document.getElementById('profile-name');
        if (nameEl) nameEl.textContent = userData?.name || user.displayName || user.email.split('@')[0];
        
        // الإيميل
        const emailEl = document.getElementById('profile-email');
        if (emailEl) emailEl.textContent = user.email;
        
        // الرصيد
        const credits = userData?.credits || 0;
        const creditsEl = document.getElementById('credits-val');
        if (creditsEl) creditsEl.textContent = credits.toLocaleString();
        
        const topCredits = document.getElementById('top-credits');
        if (topCredits) topCredits.textContent = credits + ' CR';
        
        // الإحصائيات
        const rendersEl = document.getElementById('renders-val');
        if (rendersEl) rendersEl.textContent = userData?.renders || 0;
        
        const rechargesEl = document.getElementById('recharges-val');
        if (rechargesEl) rechargesEl.textContent = userData?.recharges || 0;
        
        const assetsEl = document.getElementById('assets-val');
        if (assetsEl) assetsEl.textContent = userData?.assets || 0;
        
        // الخطة
        const plan = userData?.plan || 'free';
        const planTitle = document.getElementById('plan-title');
        const planSub = document.getElementById('plan-sub');
        const sidebarTier = document.getElementById('sidebar-tier');
        const sidebarSub = document.getElementById('sidebar-sub');
        
        const planNames = { free: 'NO PLAN', creator: 'CREATOR', pro: 'PRO', studio: 'STUDIO' };
        if (planTitle) planTitle.textContent = planNames[plan] || 'NO PLAN';
        if (planSub) planSub.textContent = plan === 'free' ? 'Initialize subscription' : 'Premium Node Enabled';
        if (sidebarTier) sidebarTier.textContent = (plan === 'free' ? 'NO PLAN' : plan.toUpperCase() + ' MEMBER');
        if (sidebarSub) sidebarSub.textContent = plan === 'free' ? 'Studio Tier 0' : 'Studio Tier 1';
        
        // كود الإحالة
        const refCode = generateReferralCode(user.uid);
        const refEl = document.getElementById('ref-code');
        if (refEl) refEl.textContent = refCode;
        
        // حفظ في localStorage
        localStorage.setItem('md_name', userData?.name || user.displayName || user.email.split('@')[0]);
        localStorage.setItem('md_email', user.email);
        localStorage.setItem('md_credits', credits);
        localStorage.setItem('md_plan', plan);
        localStorage.setItem('md_ref_code', refCode);
    }

    // إنشاء مستند جديد للمستخدم إذا لم يكن موجوداً
    async function ensureUserDocument(user) {
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);
        
        if (!userSnap.exists()) {
            // مستخدم جديد - إنشاء بيانات افتراضية
            const defaultData = {
                name: user.displayName || user.email.split('@')[0],
                email: user.email,
                credits: 100,
                plan: 'free',
                renders: 0,
                recharges: 0,
                assets: 0,
                createdAt: new Date().toISOString()
            };
            await setDoc(userRef, defaultData);
            updateUI(user, defaultData);
        } else {
            updateUI(user, userSnap.data());
        }
    }

    // مراقبة حالة تسجيل الدخول
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        
        console.log('Logged in as:', user.email);
        await ensureUserDocument(user);
    });

    // زر تسجيل الخروج
    document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
        e.preventDefault();
        await signOut(auth);
        localStorage.clear();
        window.location.href = 'login.html';
    });

    // نسخ كود الإحالة
    document.getElementById('copy-ref-btn')?.addEventListener('click', () => {
        const refCode = document.getElementById('ref-code')?.textContent;
        if (refCode) {
            navigator.clipboard.writeText(refCode);
            const btn = document.getElementById('copy-ref-btn');
            const icon = btn?.querySelector('.material-symbols-outlined');
            if (icon) {
                icon.textContent = 'check';
                setTimeout(() => { icon.textContent = 'content_copy'; }, 2000);
            }
        }
    });
</script>
</body>
</html>
