<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MercaDream - Login</title>
    <style>
        body { background: #060606; color: #e5e2e1; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #111; border: 1px solid #c8ff00; padding: 40px; text-align: center; border-radius: 8px; }
        button { background: #c8ff00; color: black; padding: 12px 24px; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; border-radius: 4px; }
        button:hover { background: #a8d700; }
        .status { margin-top: 15px; color: #ff4444; }
        .success { color: #00ff88; }
    </style>
</head>
<body>
<div class="box">
    <h1 style="color:#c8ff00;"> MERCADREAM</h1>
    <p>Sign in to continue to the studio</p>
    <button id="loginBtn"> Sign in with Google</button>
    <div id="status" class="status"></div>
</div>

<script type="module">
    import { auth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from './firebase-config.js';
    
    const loginBtn = document.getElementById('loginBtn');
    const statusDiv = document.getElementById('status');
    
    loginBtn.onclick = async () => {
        const provider = new GoogleAuthProvider();
        statusDiv.textContent = ' Logging in...';
        statusDiv.style.color = '#c8ff00';
        
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            
            // Save user data to localStorage
            localStorage.setItem('md_user', JSON.stringify(user));
            localStorage.setItem('md_email', user.email);
            localStorage.setItem('md_user_id', user.uid);
            localStorage.setItem('md_name', user.displayName || user.email.split('@')[0]);
            localStorage.setItem('sb_session', 'true');
            
            statusDiv.textContent = ' Login successful! Redirecting...';
            statusDiv.style.color = '#00ff88';
            
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 1000);
            
        } catch (error) {
            console.error('Login error:', error);
            statusDiv.textContent = ' Error: ' + error.message;
            statusDiv.style.color = '#ff4444';
        }
    };
    
    // Check if already logged in
    onAuthStateChanged(auth, (user) => {
        if (user) {
            statusDiv.textContent = 'Already logged in, redirecting...';
            statusDiv.style.color = '#00ff88';
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 500);
        }
    });
</script>
</body>
</html>
